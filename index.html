<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearRound – SE Home Services</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root {
  --navy-900:#0d1f35;
  --navy-800:#1e3a5f;
  --navy-700:#243f6a;
  --navy-600:#2d4f80;
  --navy-400:#4a7ab5;
  --gold:#f0a500;
  --gold-light:#fef3c7;
  --gold-dark:#c47f00;
  --white:#ffffff;
  --text:#e8edf5;
  --text-soft:#8fa8c8;
  --text-muted:#5a7a9e;
  --border:#243f6a;
  --border-soft:#1e3a5f;
  --done:#10b981;
  --done-light:rgba(16,185,129,.15);
  --warn:#f59e0b;
  --warn-light:rgba(245,158,11,.15);
  --danger:#ef4444;
  --danger-light:rgba(239,68,68,.15);
  --radius:10px;
  --radius-sm:7px;
  --sidebar:240px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--navy-900);color:var(--text);min-height:100vh;display:flex;}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--navy-800);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .25s;}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sidebar-logo-icon{width:36px;height:36px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--navy-900);flex-shrink:0;}
.sidebar-logo-text{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--white);line-height:1.3;}
.sidebar-logo-text span{color:var(--gold);}
.sidebar-logo-sub{font-size:10px;color:var(--text-muted);margin-top:1px;}
.sidebar-section{padding:16px 8px 4px;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-soft);font-size:13px;font-weight:500;transition:background .15s,color .15s;margin:1px 8px;text-decoration:none;}
.nav-item svg{width:17px;height:17px;flex-shrink:0;}
.nav-item:hover{background:var(--navy-700);color:var(--text);}
.nav-item.active{background:var(--gold);color:var(--navy-900);}
.nav-item.active svg{color:var(--navy-900);}
.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid var(--border);}
.sidebar-user{display:flex;align-items:center;gap:10px;}
.sidebar-user-avatar{width:32px;height:32px;border-radius:50%;background:var(--navy-600);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--gold);flex-shrink:0;}
.sidebar-user-name{font-size:13px;font-weight:500;color:var(--text);}
.sidebar-user-role{font-size:11px;color:var(--text-muted);}

/* MOBILE TOPBAR */
.mobile-topbar{display:none;background:var(--navy-800);border-bottom:1px solid var(--border);padding:0 16px;height:52px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
.mobile-logo{font-family:'DM Mono',monospace;font-size:14px;color:var(--white);}
.mobile-logo span{color:var(--gold);}
.hamburger{background:none;border:none;color:var(--text);cursor:pointer;padding:4px;}
.hamburger svg{width:22px;height:22px;}

/* MAIN */
.app-body{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.main{flex:1;padding:24px;max-width:960px;width:100%;}

/* PAGE HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.page-title{font-size:22px;font-weight:600;color:var(--white);}
.page-sub{font-size:13px;color:var(--text-muted);margin-top:3px;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:16px;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-muted);}
.search-input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;background:var(--navy-800);color:var(--text);outline:none;transition:border-color .15s;}
.search-input::placeholder{color:var(--text-muted);}
.search-input:focus{border-color:var(--gold);}

/* CARDS */
.card-list{display:flex;flex-direction:column;gap:6px;}
.card{background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,background .15s;}
.card:hover{border-color:var(--gold);background:var(--navy-700);}
.card-avatar{width:38px;height:38px;border-radius:9px;background:var(--navy-600);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--gold);flex-shrink:0;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:600;color:var(--white);}
.card-sub{font-size:12px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.badge-done{background:var(--done-light);color:var(--done);}
.badge-scheduled{background:rgba(74,122,181,.2);color:var(--navy-400);}
.badge-skipped{background:var(--warn-light);color:var(--warn);}
.badge-cant{background:var(--danger-light);color:var(--danger);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:none;outline:none;transition:background .15s,opacity .15s;}
.btn-primary{background:var(--gold);color:var(--navy-900);}
.btn-primary:hover{background:var(--gold-dark);}
.btn-ghost{background:transparent;color:var(--text-soft);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--navy-700);color:var(--text);}
.btn-danger{background:var(--danger);color:var(--white);}
.btn-done{background:var(--done);color:var(--white);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn svg{width:15px;height:15px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
@media(min-width:640px){.modal-overlay{align-items:center;justify-content:center;}}
.modal{background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-height:92vh;overflow-y:auto;transform:translateY(20px);transition:transform .2s;padding:24px 20px;}
.modal-overlay.open .modal{transform:translateY(0);}
@media(min-width:640px){.modal{border-radius:var(--radius);max-width:520px;max-height:85vh;}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:16px;font-weight:600;color:var(--white);}
.modal-close{width:30px;height:30px;border-radius:6px;background:var(--navy-700);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-soft);}
.modal-close:hover{background:var(--navy-600);}
.modal-close svg{width:15px;height:15px;}

/* FORM */
.form-grid{display:flex;flex-direction:column;gap:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;}
.field input,.field select,.field textarea{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;color:var(--text);background:var(--navy-900);outline:none;transition:border-color .15s;}
.field input::placeholder,.field textarea::placeholder{color:var(--text-muted);}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
.field select option{background:var(--navy-900);}
.field textarea{resize:vertical;min-height:72px;}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}

/* DETAIL SECTIONS */
.detail-section{background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.detail-section-header{padding:11px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between;}
.detail-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:var(--text-muted);}
.detail-value{font-weight:500;color:var(--text);}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--gold);cursor:pointer;background:none;border:none;padding:0;margin-bottom:16px;}
.back-btn svg{width:15px;height:15px;}

/* ROUND */
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.date-nav-btn{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--navy-800);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-soft);flex-shrink:0;}
.date-nav-btn:hover{border-color:var(--gold);color:var(--gold);}
.date-nav-btn svg{width:15px;height:15px;}
.date-display{flex:1;text-align:center;font-size:14px;font-weight:600;color:var(--white);}
.date-today-btn{font-size:12px;font-weight:500;color:var(--gold);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;white-space:nowrap;}
.date-today-btn:hover{background:var(--warn-light);}
.round-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.round-stat{background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;}
.round-stat-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--white);}
.round-stat-label{font-size:10px;color:var(--text-muted);margin-top:2px;}
.round-list{display:flex;flex-direction:column;gap:6px;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty svg{width:44px;height:44px;margin-bottom:12px;opacity:.25;}
.empty-title{font-size:15px;font-weight:600;color:var(--text-soft);margin-bottom:6px;}
.empty-sub{font-size:13px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy-700);color:var(--white);border:1px solid var(--border);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;transition:transform .25s ease;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--done);border-color:var(--done);}
.toast.error{background:var(--danger);border-color:var(--danger);}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px 20px;color:var(--text-muted);font-size:14px;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* COMING SOON */
.coming-soon{text-align:center;padding:80px 20px;}
.coming-soon-icon{width:64px;height:64px;background:var(--navy-700);border:1px solid var(--border);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.coming-soon-icon svg{width:28px;height:28px;color:var(--gold);}
.coming-soon h2{font-size:18px;font-weight:600;color:var(--white);margin-bottom:8px;}
.coming-soon p{font-size:13px;color:var(--text-muted);}

/* SIDEBAR OVERLAY (mobile) */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay.open{display:block;}
  .mobile-topbar{display:flex;}
  .app-body{margin-left:0;}
  .main{padding:16px;}
}
</style>
</head>

function todayStr(){return new Date().toLocaleDateString('en-CA');}
function fmtDate(d){if(!d)return'-';return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});}
function fmtShort(d){if(!d)return'-';return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function shiftDay(d,n){const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toLocaleDateString('en-CA');}
function badgeClass(s){return{done:'badge-done',scheduled:'badge-scheduled',skipped:'badge-skipped','cant-access':'badge-cant'}[s]||'';}
function statusLabel(s){return{done:'Done',scheduled:'Scheduled',skipped:'Skipped','cant-access':"Can't access"}[s]||s;}

let toastT;
function showToast(msg,type=''){
  const el=document.getElementById('toast');el.textContent=msg;el.className=`toast ${type} show`;
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),3000);
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');}

function navigate(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
  closeSidebar();
  render();
}
function render(){({customers:renderCustomers,round:renderRound,quotes:renderQuotes,invoices:renderInvoices}[currentPage]||renderRound)();}

async function loadUsers(){
  try{wcUsers=await sb(`wc_users?business_id=eq.${BUSINESS_ID}&active=eq.true&order=name.asc`);}catch(e){wcUsers=[];}
}

// ===== CUSTOMERS =====
async function renderCustomers(){
  const el=document.getElementById('mainContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div> Loading customers...</div>';
  try{customers=await sb(`wc_customers?business_id=eq.${BUSINESS_ID}&active=eq.true&order=name.asc`);}
  catch(e){el.innerHTML=`<div class="empty"><div class="empty-title">Could not load customers</div><div class="empty-sub">${esc(e.message)}</div></div>`;return;}
  el.innerHTML=`
    <div class="page-header">
      <div><div class="page-title">Customers</div><div class="page-sub">${customers.length} active customer${customers.length!==1?'s':''}</div></div>
      <button class="btn btn-primary" onclick="openAddCustomer()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>Add</button>
    </div>
    <div class="search-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input class="search-input" placeholder="Search name, address or postcode..." oninput="filterCustomers(this.value)">
    </div>
    <div class="card-list" id="customerList">${customerCards(customers)}</div>`;
}

function customerCards(list){
  if(!list.length)return'<div class="empty"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg><div class="empty-title">No customers yet</div><div class="empty-sub">Tap Add to create your first customer.</div></div>';
  return list.map(c=>`<div class="card" onclick="showCustomer('${c.id}')"><div class="card-avatar">${c.name.charAt(0).toUpperCase()}</div><div class="card-info"><div class="card-name">${esc(c.name)}</div><div class="card-sub">${esc(c.address)}, ${esc(c.postcode)}</div></div>${c.phone?`<div style="font-size:12px;color:var(--text-muted);flex-shrink:0">${esc(c.phone)}</div>`:''}</div>`).join('');
}

function filterCustomers(q){
  const l=q.toLowerCase();
  document.getElementById('customerList').innerHTML=customerCards(customers.filter(c=>c.name.toLowerCase().includes(l)||c.address.toLowerCase().includes(l)||c.postcode.toLowerCase().includes(l)));
}

async function showCustomer(id){
  const el=document.getElementById('mainContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div> Loading...</div>';
  let c=customers.find(x=>x.id===id);
  if(!c){try{[c]=await sb(`wc_customers?id=eq.${id}`);}catch(e){}}
  if(!c){el.innerHTML='<div class="empty"><div class="empty-title">Customer not found</div></div>';return;}
  el.innerHTML=`
    <button class="back-btn" onclick="renderCustomers()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>Customers</button>
    <div class="page-header">
      <div><div class="page-title">${esc(c.name)}</div><div class="page-sub">${esc(c.address)}, ${esc(c.postcode)}</div></div>
      <button class="btn btn-ghost" onclick="openEditCustomer('${c.id}')">Edit</button>
    </div>
    <div class="detail-section">
      <div class="detail-section-header">Contact</div>
      ${c.phone?`<div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${esc(c.phone)}</span></div>`:''}
      ${c.whatsapp_number?`<div class="detail-row"><span class="detail-label">WhatsApp</span><span class="detail-value">${esc(c.whatsapp_number)}</span></div>`:''}
      ${c.email?`<div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${esc(c.email)}</span></div>`:''}
      ${!c.phone&&!c.whatsapp_number&&!c.email?'<div class="detail-row"><span class="detail-label" style="font-style:italic">No contact details</span></div>':''}
    </div>
    ${c.notes?`<div class="detail-section"><div class="detail-section-header">Notes</div><div class="detail-row"><span style="color:var(--warn)">&#9888; ${esc(c.notes)}</span></div></div>`:''}
    <div class="detail-section">
      <div class="detail-section-header">Jobs<button class="btn btn-primary btn-sm" onclick="openAddJob('${c.id}')">+ Schedule job</button></div>
      <div id="customerJobs"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <button class="btn btn-danger" onclick="archiveCustomer('${c.id}')">Archive customer</button>
    </div>`;
  loadCustomerJobs(id);
}

async function loadCustomerJobs(customerId){
  try{
    const jobs=await sb(`wc_jobs?customer_id=eq.${customerId}&order=scheduled_date.desc&limit=20`);
    const el=document.getElementById('customerJobs');if(!el)return;
    if(!jobs.length){el.innerHTML='<div class="detail-row"><span class="detail-label" style="font-style:italic">No jobs yet - tap Schedule job to add one.</span></div>';return;}
    el.innerHTML=jobs.map(j=>`<div class="detail-row"><div><div style="font-size:13px;font-weight:500;color:var(--white)">${fmtShort(j.scheduled_date)}</div><div style="font-size:11px;color:var(--text-muted)">${j.frequency}</div></div><div style="display:flex;align-items:center;gap:8px"><span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--white)">£${parseFloat(j.price).toFixed(2)}</span><span class="badge ${badgeClass(j.status)}">${statusLabel(j.status)}</span></div></div>`).join('');
  }catch(e){}
}

function openAddCustomer(){
  editingCustomerId=null;
  document.getElementById('customerModalTitle').textContent='Add customer';
  ['name','address','postcode','phone','whatsapp','email','notes'].forEach(f=>document.getElementById('f-'+f).value='');
  document.getElementById('customerModal').classList.add('open');
}
function openEditCustomer(id){
  const c=customers.find(x=>x.id===id);if(!c)return;
  editingCustomerId=id;
  document.getElementById('customerModalTitle').textContent='Edit customer';
  document.getElementById('f-name').value=c.name||'';
  document.getElementById('f-address').value=c.address||'';
  document.getElementById('f-postcode').value=c.postcode||'';
  document.getElementById('f-phone').value=c.phone||'';
  document.getElementById('f-whatsapp').value=c.whatsapp_number||'';
  document.getElementById('f-email').value=c.email||'';
  document.getElementById('f-notes').value=c.notes||'';
  document.getElementById('customerModal').classList.add('open');
}
async function saveCustomer(){
  const name=document.getElementById('f-name').value.trim();
  const address=document.getElementById('f-address').value.trim();
  const postcode=document.getElementById('f-postcode').value.trim();
  if(!name||!address||!postcode){showToast('Name, address and postcode are required','error');return;}
  const payload={name,address,postcode,phone:document.getElementById('f-phone').value.trim()||null,whatsapp_number:document.getElementById('f-whatsapp').value.trim()||null,email:document.getElementById('f-email').value.trim()||null,notes:document.getElementById('f-notes').value.trim()||null};
  try{
    if(editingCustomerId){await sb(`wc_customers?id=eq.${editingCustomerId}`,{method:'PATCH',body:JSON.stringify(payload),prefer:'return=minimal'});showToast('Customer updated','success');}
    else{await sb('wc_customers',{method:'POST',body:JSON.stringify({...payload,active:true,business_id:BUSINESS_ID}),prefer:'return=minimal'});showToast('Customer added','success');}
    closeModal('customerModal');renderCustomers();
  }catch(e){showToast(e.message,'error');}
}
async function archiveCustomer(id){
  if(!confirm("Archive this customer? They won't appear in the active list."))return;
  try{await sb(`wc_customers?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({active:false}),prefer:'return=minimal'});showToast('Customer archived','success');renderCustomers();}
  catch(e){showToast(e.message,'error');}
}

// ===== JOB MODAL =====
async function openAddJob(customerId){
  jobCustomerId=customerId;
  document.getElementById('j-price').value='';
  document.getElementById('j-frequency').value='fortnightly';
  document.getElementById('j-date').value=todayStr();
  document.getElementById('j-notes').value='';
  await loadUsers();
  const sel=document.getElementById('j-assigned');
  sel.innerHTML='<option value="">Unassigned</option>'+wcUsers.map(u=>`<option value="${u.id}">${esc(u.name)}</option>`).join('');
  document.getElementById('jobModal').classList.add('open');
}
async function saveJob(){
  const price=parseFloat(document.getElementById('j-price').value);
  const frequency=document.getElementById('j-frequency').value;
  const date=document.getElementById('j-date').value;
  const assigned=document.getElementById('j-assigned').value||null;
  const notes=document.getElementById('j-notes').value.trim()||null;
  if(!price||price<=0){showToast('Enter a valid price','error');return;}
  if(!date){showToast('Select a date','error');return;}
  try{
    await sb('wc_jobs',{method:'POST',body:JSON.stringify({customer_id:jobCustomerId,business_id:BUSINESS_ID,price,frequency,scheduled_date:date,assigned_to:assigned,notes,status:'scheduled',round_order:0}),prefer:'return=minimal'});
    showToast('Job scheduled','success');closeModal('jobModal');loadCustomerJobs(jobCustomerId);
  }catch(e){showToast(e.message,'error');}
}

// ===== TODAY'S ROUND =====
async function renderRound(){
  const el=document.getElementById('mainContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div> Loading round...</div>';
  let jobs=[];
  try{jobs=await sb(`wc_jobs?scheduled_date=eq.${roundDate}&business_id=eq.${BUSINESS_ID}&order=round_order.asc,created_at.asc&select=*,wc_customers(name,address,postcode,notes)`);}
  catch(e){el.innerHTML=`<div class="empty"><div class="empty-title">Could not load round</div><div class="empty-sub">${esc(e.message)}</div></div>`;return;}

  const done=jobs.filter(j=>j.status==='done').length;
  const skipped=jobs.filter(j=>j.status==='skipped').length;
  const remaining=jobs.filter(j=>j.status==='scheduled').length;
  const earned=jobs.filter(j=>j.status==='done').reduce((s,j)=>s+parseFloat(j.price),0);
  const isToday=roundDate===todayStr();

  el.innerHTML=`
    <div class="page-header"><div class="page-title">Today's Round</div><div style="font-size:13px;color:var(--text-muted)">${jobs.length} job${jobs.length!==1?'s':''}</div></div>
    <div class="date-nav">
      <button class="date-nav-btn" onclick="changeRoundDate(-1)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button>
      <div class="date-display">${fmtDate(roundDate)}</div>
      ${!isToday?`<button class="date-today-btn" onclick="roundDate=todayStr();renderRound()">Today</button>`:'<div style="width:52px"></div>'}
      <button class="date-nav-btn" onclick="changeRoundDate(1)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></button>
    </div>
    <div class="round-summary">
      <div class="round-stat"><div class="round-stat-val">${remaining}</div><div class="round-stat-label">To do</div></div>
      <div class="round-stat"><div class="round-stat-val" style="color:var(--done)">${done}</div><div class="round-stat-label">Done</div></div>
      <div class="round-stat"><div class="round-stat-val" style="color:var(--warn)">${skipped}</div><div class="round-stat-label">Skipped</div></div>
      <div class="round-stat"><div class="round-stat-val" style="font-size:13px">£${earned.toFixed(2)}</div><div class="round-stat-label">Earned</div></div>
    </div>
    <div class="round-list">${jobs.length?jobs.map((j,i)=>roundCard(j,i+1)).join(''):`<div class="empty"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><div class="empty-title">No jobs on this date</div><div class="empty-sub">Schedule jobs from a customer profile to see them here.</div></div>`}</div>`;
}

function roundCard(j,num){
  const c=j.wc_customers||{};
  const isSched=j.status==='scheduled',isDone=j.status==='done',isSkip=j.status==='skipped',isCant=j.status==='cant-access';
  const bStyle=isDone?'border-color:var(--done)':isSkip?'border-color:var(--warn)':isCant?'border-color:var(--danger)':'';
  const numStyle=isDone?'background:var(--done-light);border-color:var(--done);color:var(--done)':'';
  const opacity=isDone||isSkip||isCant?'opacity:.75;':'';
  const actions=isSched?`<div style="display:flex;gap:6px;padding:0 14px 12px">
    <button class="btn btn-done btn-sm" style="flex:1;justify-content:center" onclick="markDone('${j.id}')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>Done</button>
    <button class="btn btn-ghost btn-sm" style="flex:1;justify-content:center" onclick="openSkip('${j.id}','skipped')">Skip</button>
    <button class="btn btn-ghost btn-sm" style="flex:1;justify-content:center;color:var(--danger);border-color:rgba(239,68,68,.3)" onclick="openSkip('${j.id}','cant-access')">No access</button>
  </div>`:`<div style="padding:0 14px 12px"><button class="btn btn-ghost btn-sm" onclick="undoStatus('${j.id}')">Undo</button></div>`;
  return`<div style="background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;${bStyle};${opacity}">
    <div style="display:flex;align-items:center;gap:12px;padding:12px 14px">
      <div style="width:26px;height:26px;border-radius:50%;background:var(--navy-700);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--text-muted);flex-shrink:0;${numStyle}">${isDone?'✓':num}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;color:var(--white)">${esc(c.name||'Unknown')}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.address||'')}${c.postcode?', '+esc(c.postcode):''}</div>
        ${c.notes?`<div style="font-size:11px;color:var(--warn);margin-top:3px;font-weight:500">&#9888; ${esc(c.notes)}</div>`:''}
        ${j.notes?`<div style="font-size:11px;color:var(--text-muted);margin-top:2px">&#128221; ${esc(j.notes)}</div>`:''}
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--gold);flex-shrink:0">£${parseFloat(j.price).toFixed(2)}</div>
    </div>${actions}</div>`;
}

function changeRoundDate(n){roundDate=shiftDay(roundDate,n);renderRound();}

async function markDone(id){
  try{await sb(`wc_jobs?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'done',completed_at:new Date().toISOString()}),prefer:'return=minimal'});showToast('Marked as done','success');renderRound();}
  catch(e){showToast(e.message,'error');}
}
function openSkip(id,status){
  skipJobId=id;skipStatus=status;
  document.getElementById('skipModalTitle').textContent=status==='skipped'?'Skip job':"Can't access";
  document.getElementById('skip-notes').value='';
  document.getElementById('skipConfirmBtn').textContent=status==='skipped'?'Skip job':"Can't access";
  document.getElementById('skipModal').classList.add('open');
}
async function confirmSkip(){
  const notes=document.getElementById('skip-notes').value.trim()||null;
  try{
    await sb(`wc_jobs?id=eq.${skipJobId}`,{method:'PATCH',body:JSON.stringify({status:skipStatus,notes}),prefer:'return=minimal'});
    showToast(skipStatus==='skipped'?'Job skipped':"Marked no access",'success');closeModal('skipModal');renderRound();
  }catch(e){showToast(e.message,'error');}
}
async function undoStatus(id){
  try{await sb(`wc_jobs?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'scheduled',completed_at:null,notes:null}),prefer:'return=minimal'});showToast('Status reset','success');renderRound();}
  catch(e){showToast(e.message,'error');}
}

// ===== COMING SOON =====
function renderQuotes(){document.getElementById('mainContent').innerHTML='<div class="coming-soon"><div class="coming-soon-icon"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div><h2>Quotes</h2><p>Coming in Sprint 4 - send quotes that auto-convert to jobs on acceptance.</p></div>';}
function renderInvoices(){document.getElementById('mainContent').innerHTML='<div class="coming-soon"><div class="coming-soon-icon"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><h2>Invoices</h2><p>Coming in Sprint 5 - Stripe payment links sent automatically on job completion.</p></div>';}

['customerModal','jobModal','skipModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeModal(id);});
});

render();
</script>
</body>
</html>
