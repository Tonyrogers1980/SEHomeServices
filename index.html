<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ClearRound">
<meta name="theme-color" content="#1e3a5f">
<title>ClearRound – SE Home Services</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%231e3a5f'/><text x='96' y='130' font-size='100' text-anchor='middle' font-family='sans-serif' font-weight='700' fill='%23f0a500'>SE</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --navy-900:#0d1f35;--navy-800:#1e3a5f;--navy-700:#243f6a;--navy-600:#2d4f80;--navy-400:#4a7ab5;
  --gold:#f0a500;--gold-dark:#c47f00;
  --white:#ffffff;--text:#e8edf5;--text-soft:#8fa8c8;--text-muted:#5a7a9e;
  --border:#243f6a;--done:#10b981;--done-light:rgba(16,185,129,.15);
  --warn:#f59e0b;--warn-light:rgba(245,158,11,.15);
  --danger:#ef4444;--danger-light:rgba(239,68,68,.15);
  --radius:12px;--radius-sm:8px;
  --bottom-nav:64px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'DM Sans',sans-serif;background:var(--navy-900);color:var(--text);min-height:100vh;min-height:-webkit-fill-available;}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;background:var(--navy-900);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 24px 32px;z-index:500;overflow-y:auto;}
.login-logo{width:72px;height:72px;background:var(--gold);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--navy-900);margin-bottom:20px;}
.login-title{font-family:'DM Mono',monospace;font-size:22px;color:var(--white);margin-bottom:4px;}
.login-title span{color:var(--gold);}
.login-sub{font-size:14px;color:var(--text-muted);margin-bottom:20px;}
.login-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;align-self:flex-start;width:100%;max-width:320px;}
.user-pick{display:flex;gap:10px;width:100%;max-width:300px;margin-bottom:20px;}
.user-btn{flex:1;padding:14px 8px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--navy-800);color:var(--text-soft);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center;}
.user-btn.selected{border-color:var(--gold);background:rgba(240,165,0,.1);color:var(--gold);}
.pin-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;align-self:flex-start;width:100%;max-width:320px;}
.pin-display{display:flex;gap:12px;margin-bottom:20px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:background .15s,border-color .15s;}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:280px;}
.num-btn{height:60px;border-radius:var(--radius);border:none;background:var(--navy-800);color:var(--text);font-family:'DM Sans',sans-serif;font-size:22px;font-weight:500;cursor:pointer;transition:background .12s,transform .08s;display:flex;align-items:center;justify-content:center;}
.num-btn:active{background:var(--navy-600);transform:scale(.95);}
.num-btn.del{font-size:18px;color:var(--text-muted);}
.login-error{color:var(--danger);font-size:13px;margin-top:12px;min-height:20px;}

/* ── LAYOUT ── */
#app{display:none;flex-direction:column;height:100vh;height:-webkit-fill-available;}
#app.visible{display:flex;}

/* TOPBAR */
.topbar{background:var(--navy-800);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:50;}
.topbar-logo{font-family:'DM Mono',monospace;font-size:15px;color:var(--white);}
.topbar-logo span{color:var(--gold);}
.topbar-page{font-size:15px;font-weight:600;color:var(--white);flex:1;}
.topbar-user{font-size:12px;color:var(--text-muted);}
.topbar-action{margin-left:auto;}

/* MAIN SCROLL AREA */
.main-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.main{padding:16px;max-width:640px;margin:0 auto;padding-bottom:calc(var(--bottom-nav) + var(--safe-bottom) + 16px);}

/* BOTTOM NAV */
.bottom-nav{height:calc(var(--bottom-nav) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--navy-800);border-top:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text-muted);font-size:10px;font-weight:500;padding:8px 4px;border:none;background:none;transition:color .15s;}
.nav-tab svg{width:22px;height:22px;}
.nav-tab.active{color:var(--gold);}
.nav-tab span{font-size:10px;}

/* PAGE HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.page-title{font-size:20px;font-weight:600;color:var(--white);}
.page-sub{font-size:13px;color:var(--text-muted);margin-top:2px;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-muted);}
.search-input{width:100%;padding:11px 12px 11px 38px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:15px;background:var(--navy-800);color:var(--text);outline:none;}
.search-input::placeholder{color:var(--text-muted);}
.search-input:focus{border-color:var(--gold);}

/* CARDS */
.card-list{display:flex;flex-direction:column;gap:8px;}
.card{background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;}
.card:active{background:var(--navy-700);}
.card-avatar{width:42px;height:42px;border-radius:10px;background:var(--navy-600);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:var(--gold);flex-shrink:0;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:15px;font-weight:600;color:var(--white);}
.card-sub{font-size:12px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:var(--radius-sm);font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;border:none;outline:none;transition:background .15s,transform .08s;min-height:48px;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--gold);color:var(--navy-900);}
.btn-primary:active{background:var(--gold-dark);}
.btn-ghost{background:transparent;color:var(--text-soft);border:1px solid var(--border);}
.btn-ghost:active{background:var(--navy-700);}
.btn-danger{background:var(--danger);color:var(--white);}
.btn-done{background:var(--done);color:var(--white);}
.btn-sm{padding:8px 14px;font-size:13px;min-height:36px;}
.btn-full{width:100%;}
.btn svg{width:18px;height:18px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-height:92vh;overflow-y:auto;transform:translateY(20px);transition:transform .22s;padding:20px 16px calc(20px + var(--safe-bottom));}
.modal-overlay.open .modal{transform:translateY(0);}
@media(min-width:600px){
  .modal-overlay{align-items:center;justify-content:center;}
  .modal{border-radius:var(--radius);max-width:520px;padding:24px 20px;}
}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:17px;font-weight:600;color:var(--white);}
.modal-close{width:34px;height:34px;border-radius:8px;background:var(--navy-700);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-soft);}
.modal-close svg{width:16px;height:16px;}

/* FORM */
.form-grid{display:flex;flex-direction:column;gap:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;}
.field input,.field select,.field textarea{padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:15px;color:var(--text);background:var(--navy-900);outline:none;-webkit-appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
.field select option{background:var(--navy-900);}
.field textarea{resize:vertical;min-height:80px;}
.form-actions{display:flex;flex-direction:column;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
@media(min-width:400px){.form-actions{flex-direction:row;justify-content:flex-end;}}

/* DETAIL */
.detail-section{background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.detail-section-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between;}
.detail-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);font-size:14px;gap:8px;}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:var(--text-muted);flex-shrink:0;}
.detail-value{font-weight:500;color:var(--text);text-align:right;}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--gold);cursor:pointer;background:none;border:none;padding:0;margin-bottom:16px;min-height:44px;}
.back-btn svg{width:16px;height:16px;}

/* ROUND — mobile-first job cards */
.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.date-nav-btn{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--navy-800);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-soft);flex-shrink:0;}
.date-nav-btn:active{background:var(--navy-600);}
.date-nav-btn svg{width:18px;height:18px;}
.date-display{flex:1;text-align:center;font-size:15px;font-weight:600;color:var(--white);}
.date-today-btn{font-size:13px;font-weight:500;color:var(--gold);background:none;border:none;cursor:pointer;padding:4px 10px;white-space:nowrap;}
.round-filter select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;color:var(--text);background:var(--navy-800);outline:none;margin-bottom:12px;-webkit-appearance:none;}
.round-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.round-stat{background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 6px;text-align:center;}
.round-stat-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--white);}
.round-stat-label{font-size:10px;color:var(--text-muted);margin-top:2px;}

/* JOB CARD — large tap targets */
.job-card{background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:6px;}
.job-card-header{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;}
.job-card-num{width:24px;height:24px;border-radius:50%;background:var(--navy-700);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--text-muted);flex-shrink:0;}
.job-card-num.done{background:var(--done-light);border-color:var(--done);color:var(--done);}
.job-card-body{flex:1;min-width:0;}
.job-card-addr-main{font-size:15px;font-weight:600;color:var(--white);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.job-card-name-sub{font-size:12px;color:var(--text-muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.job-card-name{font-size:16px;font-weight:600;color:var(--white);line-height:1.2;}
.stripe-badge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;margin-left:6px;color:var(--gold);vertical-align:middle;}
.stripe-badge svg{width:16px;height:16px;}
.job-card-addr{font-size:13px;color:var(--text-muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.job-card-svc{font-size:12px;color:var(--text-muted);margin-top:3px;}
.job-card-round{font-size:11px;color:var(--navy-400);font-weight:500;}
.job-card-note{font-size:12px;color:var(--warn);margin-top:4px;font-weight:500;}
.job-card-price{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--gold);flex-shrink:0;white-space:nowrap;}
.job-card-chevron{width:14px;height:14px;color:var(--text-muted);transition:transform .15s;flex-shrink:0;}
.job-card-chevron.open{transform:rotate(180deg);}
.job-card-details{padding:0 12px 10px 46px;}
.job-card-actions{display:grid;gap:6px;padding:0 10px 10px;}
.job-action{border:none;border-radius:8px;padding:10px 4px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:44px;transition:filter .12s,transform .08s;}
.job-action:active{transform:scale(.96);filter:brightness(1.15);}
.job-action svg{width:15px;height:15px;}
.action-done{background:var(--done);color:#ffffff;}
.action-navigate{background:var(--navy-400);color:#ffffff;}
.action-skip{background:var(--navy-700);color:var(--text-soft);border:1px solid var(--border);}
.action-charge{background:var(--gold);color:var(--navy-900);}
.action-reschedule{background:#7c5cbf;color:#ffffff;}
.action-undo{background:var(--navy-700);color:var(--text-soft);border:1px solid var(--border);}
.job-action{background:var(--navy-800);border:none;padding:14px 8px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;color:var(--text-soft);display:flex;align-items:center;justify-content:center;gap:5px;min-height:48px;transition:background .12s;}
.job-action:active{background:var(--navy-700);}
.job-action svg{width:16px;height:16px;}
.job-card.is-done{opacity:.65;border-color:var(--done);}
.job-card.is-skip{opacity:.65;border-color:var(--warn);}
.job-card.is-cant{opacity:.65;border-color:var(--danger);}
.assignee-pill{padding:6px 14px;border-radius:16px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--navy-800);color:var(--text-muted);cursor:pointer;transition:all .12s;}
.assignee-pill.selected{background:var(--gold);border-color:var(--gold);color:var(--navy-900);}

/* MISC */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;}
.badge-done{background:var(--done-light);color:var(--done);}
.badge-scheduled{background:rgba(74,122,181,.2);color:var(--navy-400);}
.badge-skipped{background:var(--warn-light);color:var(--warn);}
.badge-cant{background:var(--danger-light);color:var(--danger);}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty svg{width:48px;height:48px;margin-bottom:14px;opacity:.2;}
.empty-title{font-size:16px;font-weight:600;color:var(--text-soft);margin-bottom:8px;}
.empty-sub{font-size:14px;}
.loading{display:flex;align-items:center;justify-content:center;padding:60px 20px;color:var(--text-muted);font-size:15px;gap:12px;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:calc(var(--bottom-nav) + var(--safe-bottom) + 12px);left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy-700);color:var(--white);border:1px solid var(--border);padding:12px 20px;border-radius:24px;font-size:14px;font-weight:500;z-index:999;transition:transform .25s ease;white-space:nowrap;max-width:90vw;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--done);}
.toast.error{background:var(--danger);}
.coming-soon{text-align:center;padding:80px 20px;}
.coming-soon-icon{width:64px;height:64px;background:var(--navy-700);border:1px solid var(--border);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.coming-soon-icon svg{width:28px;height:28px;color:var(--gold);}
.coming-soon h2{font-size:18px;font-weight:600;color:var(--white);margin-bottom:8px;}
.coming-soon p{font-size:14px;color:var(--text-muted);}

/* DESKTOP SIDEBAR (≥768px) */
@media(min-width:768px){
  #app{flex-direction:row;}
  .bottom-nav{display:none;}
  .sidebar-desktop{width:220px;background:var(--navy-800);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;flex-shrink:0;}
  .sidebar-logo-wrap{padding:18px 14px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .sidebar-logo-icon{width:34px;height:34px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--navy-900);}
  .sidebar-logo-text{font-family:'DM Mono',monospace;font-size:13px;color:var(--white);}
  .sidebar-logo-text span{color:var(--gold);}
  .sidebar-logo-sub{font-size:10px;color:var(--text-muted);}
  .sidebar-section{padding:14px 8px 4px;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;}
  .sidebar-nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-soft);font-size:13px;font-weight:500;margin:1px 8px;border:none;background:none;width:calc(100% - 16px);text-align:left;}
  .sidebar-nav-item svg{width:17px;height:17px;flex-shrink:0;}
  .sidebar-nav-item:hover{background:var(--navy-700);color:var(--text);}
  .sidebar-nav-item.active{background:var(--gold);color:var(--navy-900);}
  .sidebar-footer{margin-top:auto;padding:14px;border-top:1px solid var(--border);}
  .sidebar-user-info{display:flex;align-items:center;gap:10px;}
  .sidebar-avatar{width:32px;height:32px;border-radius:50%;background:var(--navy-600);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--gold);}
  .desktop-content{flex:1;display:flex;flex-direction:column;min-width:0;}
  .topbar{position:sticky;top:0;}
  .main-scroll{flex:1;overflow-y:auto;}
  .main{padding:24px;padding-bottom:24px;}
}
@media(max-width:767px){
  .sidebar-desktop{display:none;}
  .desktop-content{display:flex;flex-direction:column;flex:1;min-height:0;}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <img src="logo.png" alt="SE Home Services" style="width:70px;height:70px;object-fit:contain;margin-top:8px;margin-bottom:10px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3))">
  <div class="login-title">clear<span>round</span></div>
  <div class="login-sub" style="margin-bottom:16px">SE Home Services</div>

  <div style="width:100%;max-width:300px;margin-bottom:6px">
    <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;text-align:center">Who are you?</div>
    <div class="user-pick" id="userPick" style="display:flex;gap:10px;width:100%;max-width:300px;margin-bottom:20px">
      <!-- Hardcoded immediately — JS updates once Supabase responds -->
      <button class="user-btn" id="ubtn-efaaa644-c709-44da-bc47-63977fe4f64f" onclick="selectUser('efaaa644-c709-44da-bc47-63977fe4f64f')">
        <div style="font-size:22px;margin-bottom:4px">T</div>

// values, it converts to UTC first and silently rolls the date back/forward across
// midnight in any non-UTC timezone (e.g. BST). Always build the string from local
// getFullYear/getMonth/getDate instead.
function localDateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayStr(){return localDateStr(new Date());}
function shiftDay(s,n){const d=new Date(s+'T12:00:00');d.setDate(d.getDate()+n);return localDateStr(d);}
function fmtDate(s){if(!s)return'—';return new Date(s+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});}
function fmtShort(s){if(!s)return'—';return new Date(s+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}

function statusLabel(s){return s==='done'?'Done':s==='skipped'?'Skipped':s==='cant-access'?"Can't access":'Scheduled';}

}

  const url=`${SUPABASE_URL}/rest/v1/${path}`;

      const user=JSON.parse(saved);
      // Validate the user object has required fields
      if(user&&user.id&&user.name&&user.pin&&user.view_mode){
        currentUser=user;
        launchApp();
        return;
      }else{
        localStorage.removeItem('cr_user');
      }
    }catch(e){
      localStorage.removeItem('cr_user');
    }
  }

  // Try to load fresh users from Supabase (updates fallback if successful)
  try{
    const fresh=await sb(`wc_users?business_id=eq.${BUSINESS_ID}&active=eq.true&order=name.asc`);
    if(fresh&&fresh.length){
      allUsers=fresh;
      // Update button labels if names differ from fallback
      allUsers.forEach(u=>{
        const btn=document.getElementById('ubtn-'+u.id);
        if(btn){
          btn.querySelector('div:last-child').textContent=u.name.split(' ')[0];
        }
      });
    }
  }catch(e){} // fallback buttons already visible in HTML
}

function renderUserPick(){
  // Update button selected state
  allUsers.forEach(u=>{
    const btn=document.getElementById('ubtn-'+u.id);
    if(btn){
      btn.classList.toggle('selected', u.id===selectedUserId);
    }
  });
  // If Supabase returned different users than fallback, rebuild
  const pick=document.getElementById('userPick');
  if(!pick)return;
  if(allUsers.length!==pick.querySelectorAll('.user-btn').length){
    pick.innerHTML=allUsers.map(u=>`
      <button class="user-btn${selectedUserId===u.id?' selected':''}" id="ubtn-${u.id}" onclick="selectUser('${u.id}')">
        <div style="font-size:22px;margin-bottom:4px">${u.name.charAt(0)}</div>
        <div>${esc(u.name.split(' ')[0])}</div>
      </button>`).join('');
  }
}

function selectUser(id){
  selectedUserId=id;pinEntry='';updatePinDisplay();
  document.getElementById('loginError').textContent='';
  // Update button styles immediately
  document.querySelectorAll('.user-btn').forEach(btn=>{
    btn.classList.toggle('selected', btn.id==='ubtn-'+id);
  });
}

function pinTap(digit){
  if(!selectedUserId){document.getElementById('loginError').textContent='Select your name first';return;}
  if(digit===''||pinEntry.length>=4)return;
  pinEntry+=digit;
  updatePinDisplay();
  if(pinEntry.length===4)setTimeout(checkPin,120);
}

function pinDel(){pinEntry=pinEntry.slice(0,-1);updatePinDisplay();}

function updatePinDisplay(){
  for(let i=0;i<4;i++){
    document.getElementById('d'+i).classList.toggle('filled',i<pinEntry.length);
  }
}

function checkPin(){
  const user=allUsers.find(u=>u.id===selectedUserId);
  if(!user){pinEntry='';updatePinDisplay();return;}
  if(user.pin===pinEntry){
    currentUser=user;
    localStorage.setItem('cr_user',JSON.stringify(user));
    launchApp();
  }else{
    document.getElementById('loginError').textContent='Incorrect PIN — try again';
    pinEntry='';updatePinDisplay();
    // Shake effect
    document.getElementById('pinDisplay').style.animation='none';
    setTimeout(()=>{document.getElementById('pinDisplay').style.animation='';},10);
  }
}

function launchApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('topbarUser').textContent=currentUser.name.split(' ')[0];
  buildNav();
  loadConfig();
  navigate('round');
}

function logout(){
  localStorage.removeItem('cr_user');
  currentUser=null;selectedUserId=null;pinEntry='';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginError').textContent='';
  updatePinDisplay();
  renderUserPick();
}

// Pull-to-refresh
(function(){
  let startY=0,pulling=false,indicator=null;
  const scrollEl=()=>document.querySelector('.main-scroll');
  document.addEventListener('touchstart',e=>{
    const s=scrollEl();if(!s)return;
    if(s.scrollTop===0){startY=e.touches[0].clientY;pulling=true;}
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!pulling)return;
    const dy=e.touches[0].clientY-startY;
    if(dy>60&&!indicator){
      indicator=document.createElement('div');
      indicator.textContent='↓ Release to refresh';
      indicator.style.cssText='position:fixed;top:52px;left:50%;transform:translateX(-50%);background:var(--navy-700);color:var(--gold);font-size:13px;font-weight:500;padding:8px 16px;border-radius:20px;z-index:999;pointer-events:none;border:1px solid var(--border)';
      document.body.appendChild(indicator);
    }
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!pulling)return;
    pulling=false;
    if(indicator){
      document.body.removeChild(indicator);
      indicator=null;
      refreshCurrentPage();
    }
    startY=0;
  },{passive:true});
})();

async function renderRoundWeek(el){
  const d=new Date(roundDate+'T12:00:00');
  const dow=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-(dow===0?6:dow-1));
  const days=[];
  for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);days.push(localDateStr(dd));}
  const weekStart=days[0],weekEnd=days[6];
  let jobs=[];

async function renderRoundMonth(el){
  const d=new Date(roundDate+'T12:00:00');
  const year=d.getFullYear(),month=d.getMonth();
  const firstDay=new Date(year,month,1),lastDay=new Date(year,month+1,0);
  const monthStart=localDateStr(firstDay),monthEnd=localDateStr(lastDay);
  let jobs=[];
  try{
    const af=currentUser?.view_mode==='round_only'?`&assigned_to=eq.${currentUser.id}`:'';
    jobs=await sb(`wc_jobs?next_due=gte.${monthStart}&next_due=lte.${monthEnd}&business_id=eq.${BUSINESS_ID}${af}&select=id,next_due,status,price`);
  }catch(e){el.innerHTML=`<div class="empty"><div class="empty-title">Could not load</div><div class="empty-sub">${esc(e.message)}</div></div>`;return;}
  const byDate={};
  jobs.forEach(j=>{if(j.next_due){if(!byDate[j.next_due])byDate[j.next_due]=[];byDate[j.next_due].push(j);}});
  const prevMonth=localDateStr(new Date(year,month-1,1));
  const nextMonth=localDateStr(new Date(year,month+1,1));
  const today=todayStr();
  const monthName=firstDay.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const monthTotal=jobs.reduce((s,j)=>s+parseFloat(j.price||0),0);
  const startDow=firstDay.getDay()===0?6:firstDay.getDay()-1;
  const totalCells=Math.ceil((startDow+lastDay.getDate())/7)*7;
  let cells='';
  for(let i=0;i<totalCells;i++){
    const dayNum=i-startDow+1;
    if(dayNum<1||dayNum>lastDay.getDate()){cells+=`<div></div>`;continue;}
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    const dayJobs=byDate[dateStr]||[];
    const isToday=dateStr===today,isSelected=dateStr===roundDate;
    const hasDone=dayJobs.some(j=>j.status==='done');
    const hasScheduled=dayJobs.some(j=>j.status==='scheduled');
    const hasSkipped=dayJobs.some(j=>j.status==='skipped'||j.status==='cant-access');
    cells+=`<div onclick="roundDate='${dateStr}';roundView='day';renderRound()" style="min-height:48px;background:${isSelected?'rgba(240,165,0,.15)':isToday?'rgba(240,165,0,.08)':'var(--navy-800)'};border:1px solid ${isSelected?'var(--gold)':isToday?'rgba(240,165,0,.4)':'var(--border)'};border-radius:var(--radius-sm);padding:4px;cursor:pointer">
      <div style="font-size:12px;font-weight:${isToday?'700':'500'};color:${isToday||isSelected?'var(--gold)':'var(--text-soft)'}">${dayNum}</div>
      ${dayJobs.length?`<div style="font-size:10px;color:var(--gold);font-weight:600">${dayJobs.length}</div>
      <div style="display:flex;gap:2px;flex-wrap:wrap;margin-top:1px">
        ${hasDone?`<div style="width:5px;height:5px;border-radius:50%;background:var(--done)"></div>`:''}
        ${hasScheduled?`<div style="width:5px;height:5px;border-radius:50%;background:var(--navy-400)"></div>`:''}
        ${hasSkipped?`<div style="width:5px;height:5px;border-radius:50%;background:var(--warn)"></div>`:''}
      </div>`:''}
    </div>`;
  }
  el.innerHTML=`
    ${roundViewBar()}
    <div class="date-nav">
      <button class="date-nav-btn" onclick="roundDate='${prevMonth}';renderRound()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button>
      <div class="date-display">${monthName}</div>
      <button class="date-nav-btn" onclick="roundDate='${nextMonth}';renderRound()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></button>
    </div>
    <div style="background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;font-size:13px">
      <span style="color:var(--text-muted)">${jobs.length} jobs this month</span>
      <span style="font-family:'DM Mono',monospace;color:var(--gold)">£${monthTotal.toFixed(2)}</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">
      ${['M','T','W','T','F','S','S'].map(x=>`<div style="text-align:center;font-size:10px;font-weight:600;color:var(--text-muted);padding:4px 0">${x}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${cells}</div>`;
}

async function autoInvoiceJob(jobId){
  try{
    // Fetch job with customer details
    const [job]=await sb(`wc_jobs?id=eq.${jobId}&select=*,wc_customers(id,name,email,phone,whatsapp_number,auto_invoice)`);
    if(!job)return;
    const c=job.wc_customers||{};
    if(c.auto_invoice===false)return; // opted out
    if(!c.email&&!c.whatsapp_number&&!c.phone)return; // no contact — skip silently

    // Create invoice
    const [inv]=await sb('wc_invoices?select=*',{method:'POST',body:JSON.stringify({
      business_id:BUSINESS_ID,
      customer_id:job.customer_id,
      job_id:jobId,
      amount:job.price,
      notes:job.service_type||null,
      status:'sent',
      sent_at:new Date().toISOString()
    }),prefer:'return=representation'});

    // Fire n8n delivery webhook
    if(inv){
      fetch(N8N_INVOICE_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        invoice_id:inv.id,
        customer_name:c.name||'Customer',
        customer_phone:c.whatsapp_number||c.phone||'',
        customer_email:c.email||'',
        amount:job.price,
        service_type:job.service_type||'Window Cleaning',
        due_date:'',notes:''
      })}).catch(()=>{});
      showToast('Invoice sent to '+c.name,'success');
    }
  }catch(e){console.warn('Auto-invoice failed',e);}
}

// ── RESCHEDULE ────────────────────────────────────────────────────────────────
let rescheduleJobId=null,rescheduleSeriesId=null;

function openReschedule(jobId, seriesId){
  rescheduleJobId=jobId;
  rescheduleSeriesId=seriesId;
  document.getElementById('reschedule-date').value='';
  document.getElementById('rs-single').checked=true;
  // Only show "all series" option if job belongs to a series
  document.getElementById('rs-all-label').style.display=seriesId?'flex':'none';
  document.getElementById('rescheduleModal').classList.add('open');
}

async function confirmReschedule(){
  const newDate=document.getElementById('reschedule-date').value;
  if(!newDate){showToast('Select a new date','error');return;}
  const scope=document.querySelector('input[name="reschedule-scope"]:checked').value;
  try{
    if(scope==='single'||!rescheduleSeriesId){
      // Move just this job
      await sb(`wc_jobs?id=eq.${rescheduleJobId}`,{
        method:'PATCH',
        body:JSON.stringify({next_due:newDate,scheduled_date:newDate}),
        prefer:'return=minimal'
      });
      showToast('Job rescheduled','success');
    }else{
      // Move this job AND all future scheduled jobs in the series
      // First get current job's date to know what "future" means
      const [job]=await sb(`wc_jobs?id=eq.${rescheduleJobId}&select=next_due`);
      const currentDate=job?.next_due||todayStr();
      // Calculate the day offset to apply to all future jobs
      const offsetDays=Math.round((new Date(newDate)-new Date(currentDate))/(1000*60*60*24));
      // Get all future scheduled jobs in this series
      const futureJobs=await sb(`wc_jobs?series_id=eq.${rescheduleSeriesId}&status=eq.scheduled&next_due=gte.${currentDate}&select=id,next_due`);
      // Update each one by shifting the same number of days
      await Promise.all(futureJobs.map(fj=>{
        const shifted=new Date(fj.next_due+'T12:00:00');
        shifted.setDate(shifted.getDate()+offsetDays);
        const d=shifted.toISOString().split('T')[0];
        return sb(`wc_jobs?id=eq.${fj.id}`,{method:'PATCH',body:JSON.stringify({next_due:d,scheduled_date:d}),prefer:'return=minimal'});
      }));
      showToast(`${futureJobs.length} jobs rescheduled`,'success');
    }
    closeModal('rescheduleModal');renderRound();
  }catch(e){showToast(e.message,'error');}
}

async function loadPaymentMethod(stripeCustomerId){
  const el=document.getElementById('stripePaymentMethod');
  if(!el)return;
  try{
    const res=await Promise.race([
      fetch(N8N_PAYMENT_METHOD_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stripe_customer_id:stripeCustomerId})}),
      new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),8000))
    ]);
    const data=await res.json();
    const methods=data.payment_methods||[];
    if(!methods.length){
      el.innerHTML='<div class="detail-row"><span class="detail-label" style="font-style:italic;color:var(--text-muted)">No card on file</span></div>';
      return;
    }
    const defaultId=data.default_payment_method;
    const card=(defaultId&&methods.find(m=>m.id===defaultId))||methods[0];
    const cc=card.card||{};
    const now=new Date();
    const isExpired=cc.exp_year&&cc.exp_month&&(cc.exp_year<now.getFullYear()||(cc.exp_year===now.getFullYear()&&cc.exp_month<now.getMonth()+1));
    const brand=(cc.brand||'card').replace(/^\w/,ch=>ch.toUpperCase());
    const expStr=cc.exp_month&&cc.exp_year?`${String(cc.exp_month).padStart(2,'0')}/${String(cc.exp_year).slice(-2)}`:'—';
    el.innerHTML=`<div class="detail-row">
      <span class="detail-label">Card on file</span>
      <span class="detail-value" style="display:flex;align-items:center;gap:8px">
        <span>${esc(brand)} •••• ${esc(cc.last4||'••••')}</span>
        <span style="font-family:'DM Mono',monospace;font-size:12px;color:${isExpired?'var(--danger)':'var(--text-muted)'}">${isExpired?'Expired '+expStr:'Exp '+expStr}</span>
        ${isExpired?'<span class="badge badge-cant">Expired</span>':'<span class="badge badge-done">Valid</span>'}
      </span>
    </div>`;
  }catch(e){

async function saveCustomer(){
  const name=document.getElementById('f-name').value.trim();
  const address=document.getElementById('f-address').value.trim();
  const postcode=document.getElementById('f-postcode').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  const email=document.getElementById('f-email').value.trim();
  if(!name||!address||!postcode){showToast('Name, address and postcode are required','error');return;}
  if(!phone){showToast('Phone number is required','error');return;}
  if(!email){showToast('Email address is required','error');return;}
  const autoInvoice=document.getElementById('f-auto-invoice').checked;
  let whatsapp=document.getElementById('f-whatsapp').value.trim()||null;
  // Auto-fill whatsapp from phone if mobile and not already set
  if(!whatsapp&&phone&&phone.match(/^(\+447|07)/)){
    whatsapp=phone.startsWith('07')?'+44'+phone.slice(1):phone;
  }
  const payload={name,address,postcode,phone,email,
    whatsapp_number:whatsapp,
    notes:document.getElementById('f-notes').value.trim()||null,
    auto_invoice:autoInvoice};
  try{
    if(editingCustomerId){
      await sb(`wc_customers?id=eq.${editingCustomerId}`,{method:'PATCH',body:JSON.stringify(payload),prefer:'return=minimal'});
      showToast('Customer updated','success');
    }else{
      const [newCust]=await sb('wc_customers?select=*',{method:'POST',body:JSON.stringify({...payload,active:true,business_id:BUSINESS_ID}),prefer:'return=representation'});
      showToast('Customer added','success');
      // Auto-send payment setup invite to new customers
      if(newCust&&email){
        customers=[...customers,newCust].sort((a,b)=>a.name.localeCompare(b.name));
        setTimeout(()=>sendPaymentSetup(newCust.id),500);
      }
    }
    closeModal('customerModal');renderCustomers();
  }catch(e){showToast(e.message,'error');}
}

}

async function sendPaymentSetup(customerId){
  let c=customers.find(x=>x.id===customerId);
  if(!c){
    try{[c]=await sb(`wc_customers?id=eq.${customerId}&select=*`);}catch(e){}
  }
  if(!c){showToast('Customer not found','error');return;}
  if(!c.email){showToast('Customer needs an email address first','error');return;}
  const btn=event?.target;
  if(btn){btn.disabled=true;btn.textContent='Sending…';}
  try{
    const res=await fetch(N8N_PAYMENT_SETUP_WEBHOOK,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        customer_id:c.id,
        customer_name:c.name,
        customer_email:c.email,
        customer_phone:c.whatsapp_number||c.phone||'',
        stripe_customer_id:c.stripe_customer_id||null
      })
    });
    if(res.ok){
      const data=await res.json().catch(()=>({}));
      // Update local customer record with Stripe ID if returned
      if(data.stripe_customer_id){
        c.stripe_customer_id=data.stripe_customer_id;
        c.stripe_setup_sent_at=new Date().toISOString();
      }
      showToast('Payment setup link sent ✓','success');
      // Refresh customer detail view
      setTimeout(()=>showCustomer(customerId),800);
    }else{
      const err=await res.json().catch(()=>({}));
      showToast('⚠ '+(err.message||'Delivery failed'),'error');
      if(btn){btn.disabled=false;btn.textContent='💳 Send payment setup invite';}
    }
  }catch(e){
    showToast('⚠ Could not reach delivery service','error');
    if(btn){btn.disabled=false;btn.textContent='💳 Send payment setup invite';}
  }
}

async function saveQuote(status){
  const customerId=document.getElementById('q-customer').value;
  const price=parseFloat(document.getElementById('q-price').value);
  if(!customerId){showToast('Select a customer','error');return;}
  if(!price||price<=0){showToast('Enter a valid price','error');return;}
  const payload={customer_id:customerId,business_id:BUSINESS_ID,price,status,
    frequency:document.getElementById('q-frequency').value||'one-off',
    service_type:document.getElementById('q-service').value||null,
    round_name:document.getElementById('q-round').value||null,
    day_of_week:document.getElementById('q-day').value||null,
    notes:document.getElementById('q-notes').value.trim()||null,
    start_date:document.getElementById('q-start-date').value||null,
    sent_at:status==='sent'?new Date().toISOString():null};
  try{
    let quoteId=editingQuoteId;
    if(editingQuoteId){
      await sb(`wc_quotes?id=eq.${editingQuoteId}`,{method:'PATCH',body:JSON.stringify(payload),prefer:'return=minimal'});
      showToast('Quote updated','success');
    }else{
      // Use return=representation to get the new quote's ID
      const [newQuote]=await sb('wc_quotes?select=id',{method:'POST',body:JSON.stringify(payload),prefer:'return=representation'});
      quoteId=newQuote?.id||null;
      showToast(status==='sent'?'Quote saved':'Draft saved','success');
    }
    if(status==='sent'){
      const customer=customers.find(c=>c.id===customerId)||{};
      fireQuoteWebhook({quoteId,customer,price,service_type:payload.service_type,frequency:payload.frequency,notes:payload.notes,start_date:payload.start_date||null});
    }
    closeModal('quoteModal');renderQuotes();
  }catch(e){showToast(e.message,'error');}
}
async function fireQuoteWebhook({quoteId,customer,price,service_type,frequency,notes,start_date}){
  if(!quoteId){console.warn('No quote ID — skipping webhook');return;}
  const acceptLink=`https://sehomeservices.app.n8n.cloud/webhook/clearround-quote-accept?quote_id=${quoteId}`;
  try{
    const res=await fetch(N8N_QUOTE_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      quote_id:quoteId,
      accept_link:acceptLink,
      customer_name:customer.name||'Customer',
      customer_phone:customer.whatsapp_number||customer.phone||'',
      customer_email:customer.email||'',
      price,service_type:service_type||'Window Cleaning',
      frequency:frequency||'one-off',
      notes:notes||'',
      start_date:start_date||''
    })});
    if(res.ok){
      showToast('Quote sent via WhatsApp & email ✓','success');
    }else{
      const err=await res.json().catch(()=>({}));
      const msg=err?.message||`Delivery failed (${res.status})`;
      showToast('⚠ '+msg,'error');
      console.warn('Webhook error:',msg);
    }
  }catch(e){
    showToast('⚠ Could not reach delivery service — check n8n','error');
    console.warn('Webhook failed',e);
  }
}

async function renderInvoices(){

  catch(e){el.innerHTML=`<div class="empty"><div class="empty-title">Could not load</div></div>`;return;}
  const counts={all:invoices.length,draft:0,sent:0,paid:0,void:0};
  invoices.forEach(i=>{if(counts[i.status]!==undefined)counts[i.status]++;});
  const overdueCount=invoices.filter(i=>isOverdue(i)).length;
  const filtered=invoiceFilter==='overdue'?invoices.filter(i=>isOverdue(i)):invoiceFilter==='all'?invoices:invoices.filter(i=>i.status===invoiceFilter);
  const totalEarned=invoices.filter(i=>i.status==='paid').reduce((s,i)=>s+parseFloat(i.amount||0),0);

      ${['all','overdue','draft','sent','paid','void'].map(f=>{
        const cnt=f==='overdue'?overdueCount:f==='all'?counts.all:(counts[f]||0);
        const isActive=invoiceFilter===f,isDanger=f==='overdue'&&cnt>0;
        return`<button onclick="invoiceFilter='${f}';renderInvoices()" style="padding:6px 12px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid ${isDanger&&!isActive?'var(--danger)':'var(--border)'};background:${isActive?(isDanger?'var(--danger)':'var(--gold)'):'var(--navy-800)'};color:${isActive?(isDanger?'var(--white)':'var(--navy-900)'):(isDanger?'var(--danger)':'var(--text-soft)')}">

async function renderOwing(){
  document.getElementById('topbarPage').textContent='Owing';
  const el=document.getElementById('mainContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div> Loading…</div>';
  let jobs=[];
  try{
    // Done jobs not yet paid — whether or not they've already been invoiced/sent
    jobs=await sb(
      `wc_jobs?business_id=eq.${BUSINESS_ID}&status=eq.done` +
      `&select=*,wc_customers(name,address,postcode,email,phone,whatsapp_number,stripe_customer_id)` +
      `&order=last_done.desc`
    );
    // Attach the latest invoice (any status) for each job, so we can reuse it instead of
    // creating duplicates, and exclude only jobs that are actually PAID.
    const jobIds=jobs.map(j=>j.id);
    let invByJob={};
    if(jobIds.length){
      const existingInvs=await sb(`wc_invoices?business_id=eq.${BUSINESS_ID}&job_id=in.(${jobIds.join(',')})&select=id,job_id,status,stripe_payment_link,payment_method&order=created_at.desc`);
      existingInvs.forEach(inv=>{if(inv.job_id&&!invByJob[inv.job_id])invByJob[inv.job_id]=inv;}); // first = latest due to order
    }
    jobs=jobs.filter(j=>invByJob[j.id]?.status!=='paid').map(j=>({...j,_invoice:invByJob[j.id]||null}));
  }catch(e){el.innerHTML=`<div class="empty"><div class="empty-title">Could not load</div><div class="empty-sub">${esc(e.message)}</div></div>`;return;}

  const total=jobs.reduce((s,j)=>s+parseFloat(j.price||0),0);

  el.innerHTML=`
    <div class="page-header">
      <div><div class="page-title">Owing</div><div class="page-sub">${jobs.length} unpaid job${jobs.length!==1?'s':''} · £${total.toFixed(2)} total</div></div>
    </div>
    ${jobs.length===0?`<div class="empty"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><div class="empty-title">All clear!</div><div class="empty-sub">No completed jobs waiting for payment.</div></div>`:`
    <div class="card-list" id="owingList">
      ${jobs.map(j=>owingCard(j)).join('')}
    </div>`}`;
}

  const c=j.wc_customers||{};
  const inv=j._invoice;
  const alreadySent=inv&&inv.status==='sent';
  return`<div class="job-card" id="owing-${j.id}">
    <div class="job-card-header">

async function ensureInvoice(jobId,amount,serviceType){
  const [existing]=await sb(`wc_invoices?job_id=eq.${jobId}&status=neq.paid&order=created_at.desc&limit=1`);
  if(existing)return existing;
  const [job]=await sb(`wc_jobs?id=eq.${jobId}&select=customer_id`);
  const [inv]=await sb('wc_invoices?select=*',{method:'POST',body:JSON.stringify({
    business_id:BUSINESS_ID,customer_id:job?.customer_id,job_id:jobId,amount:parseFloat(amount),
    notes:serviceType||'Window Cleaning',status:'sent',sent_at:new Date().toISOString()
  }),prefer:'return=representation'});
  return inv;
}

async function chargeJobStripe(jobId,customerName,amount,serviceType,email,phone,stripeCustomerId){
  if(stripeCustomerId){
    showToast('Charging saved card…');
    try{
      const inv=await ensureInvoice(jobId,amount,serviceType);
      const res=await fetch(N8N_CHARGE_SAVED_CARD_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        stripe_customer_id:stripeCustomerId,amount:parseFloat(amount),invoice_id:inv?.id,description:serviceType||'Window Cleaning'
      })});
      const data=await res.json().catch(()=>({}));
      if(data.ok){
        showToast('Charged ✓','success');
        refreshCurrentPage();
      }else{
        const reason=data.error==='no_payment_method'?'No card on file':(data.error||'Charge failed');
        showToast(reason+' — choose another option','error');
        openPaymentChoice(jobId,customerName,amount,reason);
      }
    }catch(e){showToast('Failed: '+e.message,'error');}
  }else{
    openPaymentChoice(jobId,customerName,amount,'No card on file');
  }
}

function openPaymentChoice(jobId,customerName,amount,reason){
  const body=document.getElementById('paymentChoiceBody');
  body.innerHTML=`
    <div style="padding:0 16px 16px;font-size:13px;color:var(--text-muted)">${esc(customerName)} · £${parseFloat(amount||0).toFixed(2)} · ${esc(reason||'no card on file')}</div>
    <div style="padding:0 16px 16px;display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-ghost btn-full" onclick="closeModal('paymentChoiceModal');recordCash('${jobId}')">💵 Record as cash</button>
      <button class="btn btn-ghost btn-full" onclick="closeModal('paymentChoiceModal');recordBankTransfer('${jobId}')">🏦 Record as bank transfer</button>
      <button class="btn btn-primary btn-full" onclick="closeModal('paymentChoiceModal');sendStripeSetupFromJob('${jobId}')">🔗 Send Stripe setup link</button>
    </div>`;
  document.getElementById('paymentChoiceModal').classList.add('open');
}

async function sendStripeSetupFromJob(jobId){
  try{
    const [job]=await sb(`wc_jobs?id=eq.${jobId}&select=customer_id`);
    if(job?.customer_id)await sendPaymentSetup(job.customer_id);
  }catch(e){showToast(e.message,'error');}
}


async function recordManualPayment(jobId,method,label){
  if(!confirm(`Record this job as paid by ${label}?`))return;
  try{
    const [existing]=await sb(`wc_invoices?job_id=eq.${jobId}&status=neq.paid&order=created_at.desc&limit=1`);
    if(existing){
      await sb(`wc_invoices?id=eq.${existing.id}`,{method:'PATCH',body:JSON.stringify({
        status:'paid',paid_at:new Date().toISOString(),payment_method:method
      }),prefer:'return=minimal'});
    }else{
      const [job]=await sb(`wc_jobs?id=eq.${jobId}&select=customer_id,price,service_type`);
      await sb('wc_invoices',{method:'POST',body:JSON.stringify({
        business_id:BUSINESS_ID,customer_id:job.customer_id,job_id:jobId,
        amount:job.price,notes:job.service_type||null,
        status:'paid',paid_at:new Date().toISOString(),payment_method:method,
        sent_at:new Date().toISOString()
      }),prefer:'return=minimal'});
    }
    showToast(`Recorded as ${label} ✓`,'success');renderOwing();
  }catch(e){showToast(e.message,'error');}
}
async function recordCash(jobId){return recordManualPayment(jobId,'cash','cash');}
async function recordBankTransfer(jobId){return recordManualPayment(jobId,'bank_transfer','bank transfer');}

let jobsSearch='',jobsAssignees=null;

function freqLabel(f){
  const map={'one-off':'One-off','weekly':'Weekly','fortnightly':'Fortnightly','4-weekly':'Every 4 weeks','8-weekly':'Every 8 weeks'};
  return map[f]||f||'—';
}

async function renderJobs(){
  document.getElementById('topbarPage').textContent='Jobs';
  const el=document.getElementById('mainContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div> Loading…</div>';
  await loadUsers();
  if(jobsAssignees===null)jobsAssignees=new Set([...wcUsers.map(u=>u.id),'unassigned']);

  let jobs=[];
  try{
    jobs=await sb(`wc_jobs?business_id=eq.${BUSINESS_ID}&status=eq.scheduled&select=*,wc_customers(id,name,address,postcode)&order=next_due.asc`);
  }catch(e){el.innerHTML=`<div class="empty"><div class="empty-title">Could not load</div><div class="empty-sub">${esc(e.message)}</div></div>`;return;}

  // One row per client job — recurring series collapse to their soonest upcoming occurrence;
  // one-off jobs (no series_id) are each their own row.
  const seen=new Set();
  const deduped=[];
  for(const j of jobs){
    const key=j.series_id||j.id;
    if(seen.has(key))continue;
    seen.add(key);
    deduped.push(j);
  }

  const q=jobsSearch.trim().toLowerCase();
  const filtered=deduped.filter(j=>{
    const assigneeKey=j.assigned_to||'unassigned';
    if(!jobsAssignees.has(assigneeKey))return false;
    if(q&&!(j.wc_customers?.name||'').toLowerCase().includes(q))return false;
    return true;
  });
  const totalValue=filtered.reduce((s,j)=>s+parseFloat(j.price||0),0);

  el.innerHTML=`
    <div class="page-header"><div><div class="page-title">Jobs</div><div class="page-sub">${filtered.length} active job${filtered.length!==1?'s':''} · £${totalValue.toFixed(2)} total value</div></div></div>
    <div class="search-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input class="search-input" placeholder="Search by customer…" value="${esc(jobsSearch)}" oninput="jobsSearch=this.value;renderJobs()">
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 16px">
      ${wcUsers.map(u=>`<button class="assignee-pill${jobsAssignees.has(u.id)?' selected':''}" onclick="toggleJobsAssignee('${u.id}')">${esc(u.name)}</button>`).join('')}
      <button class="assignee-pill${jobsAssignees.has('unassigned')?' selected':''}" onclick="toggleJobsAssignee('unassigned')">Unassigned</button>
    </div>
    ${filtered.length===0?`<div class="empty"><div class="empty-title">No jobs found</div></div>`:`
    <div class="card-list">${filtered.map(j=>jobsOverviewCard(j)).join('')}</div>`}
  `;
}

function toggleJobsAssignee(key){
  if(jobsAssignees.has(key))jobsAssignees.delete(key);

}

function jobsOverviewCard(j){

let revenuePeriod='week',revenueAssignees=null; // Set of user ids; null = not yet initialized (defaults to all)

async function renderRevenue(){
  document.getElementById('topbarPage').textContent='Revenue';
  const el=document.getElementById('mainContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div> Loading…</div>';
  await loadUsers();
  if(revenueAssignees===null)revenueAssignees=new Set(wcUsers.map(u=>u.id));

  const allSelected=revenueAssignees.size===wcUsers.length;
  const noneSelected=revenueAssignees.size===0;
  const af=(!allSelected&&!noneSelected)?`&assigned_to=in.(${[...revenueAssignees].join(',')})`:'';
  let scheduled=[],done=[];
  if(!noneSelected){
    try{
      // Estimated income — every currently scheduled job (covers the 3-month rolling horizon)
      scheduled=await sb(`wc_jobs?business_id=eq.${BUSINESS_ID}&status=eq.scheduled${af}&select=next_due,price,assigned_to&order=next_due.asc`);
      // Actual income — completed jobs over the last 6 months
      const since=localDateStr(new Date(Date.now()-183*86400000));
      done=await sb(`wc_jobs?business_id=eq.${BUSINESS_ID}&status=eq.done&last_done=gte.${since}${af}&select=last_done,price,assigned_to&order=last_done.asc`);
    }catch(e){el.innerHTML=`<div class="empty"><div class="empty-title">Could not load</div><div class="empty-sub">${esc(e.message)}</div></div>`;return;}
  }

  const estBuckets=bucketByPeriod(scheduled,'next_due',revenuePeriod);
  const actBuckets=bucketByPeriod(done,'last_done',revenuePeriod);
  const estTotal=scheduled.reduce((s,j)=>s+parseFloat(j.price||0),0);
  const actTotal=done.reduce((s,j)=>s+parseFloat(j.price||0),0);

  el.innerHTML=`
    <div class="page-header"><div><div class="page-title">Revenue</div><div class="page-sub">Estimated vs actual income</div></div></div>
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
      <div style="display:flex;gap:2px;background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px">
        ${['Week','Month'].map(v=>`<button onclick="revenuePeriod='${v.toLowerCase()}';renderRevenue()" style="padding:5px 14px;border-radius:6px;font-size:13px;font-weight:500;border:none;cursor:pointer;background:${revenuePeriod===v.toLowerCase()?'var(--gold)':'transparent'};color:${revenuePeriod===v.toLowerCase()?'var(--navy-900)':'var(--text-soft)'}">${v}</button>`).join('')}
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
      ${wcUsers.map(u=>`<button class="assignee-pill${revenueAssignees.has(u.id)?' selected':''}" onclick="toggleRevenueAssignee('${u.id}')">${esc(u.name)}</button>`).join('')}
    </div>
    ${noneSelected?`<div class="empty" style="padding:24px 0"><div class="empty-sub">Select at least one assignee to see revenue</div></div>`:`
    <div class="round-summary" style="margin-bottom:20px">
      <div class="round-stat"><div class="round-stat-val" style="font-size:15px;color:var(--navy-400)">£${estTotal.toFixed(0)}</div><div class="round-stat-label">Estimated (scheduled)</div></div>
      <div class="round-stat"><div class="round-stat-val" style="font-size:15px;color:var(--done)">£${actTotal.toFixed(0)}</div><div class="round-stat-label">Actual (done, 6mo)</div></div>
    </div>
    <div style="font-size:13px;font-weight:600;color:var(--text-soft);margin-bottom:8px">Estimated income — ${revenuePeriod==='week'?'by week':'by month'}</div>
    ${revenueChart(estBuckets,'var(--navy-400)')}
    <div style="font-size:13px;font-weight:600;color:var(--text-soft);margin:20px 0 8px">Actual income — ${revenuePeriod==='week'?'by week':'by month'}</div>
    ${revenueChart(actBuckets,'var(--done)')}
    `}
  `;
}

function toggleRevenueAssignee(id){
  if(revenueAssignees.has(id))revenueAssignees.delete(id);
  else revenueAssignees.add(id);
  renderRevenue();
}

function bucketByPeriod(jobs,dateField,period){
  const map={};
  jobs.forEach(j=>{
    const d=j[dateField];
    if(!d)return;
    const key=period==='week'?weekKey(d):d.slice(0,7);
    map[key]=(map[key]||0)+parseFloat(j.price||0);
  });
  return Object.entries(map).sort((a,b)=>a[0]<b[0]?-1:1).slice(-12);
}

function weekKey(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  const dow=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-(dow===0?6:dow-1));
  return localDateStr(mon);
}

function revenueChart(buckets,color){
  if(!buckets.length)return`<div class="empty" style="padding:24px 0"><div class="empty-sub">No data for this range</div></div>`;
  const max=Math.max(...buckets.map(b=>b[1]),1);
  return`<div style="display:flex;align-items:flex-end;gap:6px;height:150px;padding:12px 10px;background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius-sm);overflow-x:auto">
    ${buckets.map(([key,val])=>{
      const h=Math.max(4,Math.round((val/max)*110));
      const label=revenuePeriod==='week'?fmtShort(key).replace(/\s\d{4}$/,''):new Date(key+'-01T12:00:00').toLocaleDateString('en-GB',{month:'short'});
      return`<div style="flex:1;min-width:26px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
        <div style="font-size:10px;color:var(--text-muted);margin-bottom:2px;white-space:nowrap">£${val.toFixed(0)}</div>
        <div style="width:100%;max-width:28px;height:${h}px;background:${color};border-radius:3px 3px 0 0"></div>
        <div style="font-size:9px;color:var(--text-muted);margin-top:4px;white-space:nowrap">${label}</div>
      </div>`;
    }).join('')}
  </div>`;
}

  openEditCustomer(id);
}
function addSettingsItem(type){document.getElementById(`add-${type}-form`).style.display='block';document.getElementById(`new-${type}-name`).focus();}
async function saveNewRound(){
  const name=document.getElementById('new-round-name').value.trim();if(!name){showToast('Enter a name','error');return;}
  try{await sb('wc_rounds',{method:'POST',body:JSON.stringify({name,business_id:BUSINESS_ID,active:true}),prefer:'return=minimal'});showToast('Round added','success');wcRounds=[];renderSettings();}catch(e){showToast(e.message,'error');}
}
async function saveNewService(){
  const name=document.getElementById('new-service-name').value.trim();if(!name){showToast('Enter a name','error');return;}
  try{await sb('wc_service_types',{method:'POST',body:JSON.stringify({name,business_id:BUSINESS_ID,active:true}),prefer:'return=minimal'});showToast('Service added','success');wcServiceTypes=[];renderSettings();}catch(e){showToast(e.message,'error');}
}
async function toggleSettingsItem(type,id,active){
  const table=type==='round'?'wc_rounds':'wc_service_types';
  try{await sb(`${table}?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({active:!active}),prefer:'return=minimal'});if(type==='round')wcRounds=[];else wcServiceTypes=[];showToast(active?'Deactivated':'Activated','success');renderSettings();}catch(e){showToast(e.message,'error');}
}
async function deleteSettingsItem(type,id,name){
  if(!confirm(`Delete "${name}"?`))return;
  const table=type==='round'?'wc_rounds':'wc_service_types';
  try{await sb(`${table}?id=eq.${id}`,{method:'DELETE',prefer:'return=minimal'});if(type==='round')wcRounds=[];else wcServiceTypes=[];showToast('Deleted','success');renderSettings();}catch(e){showToast(e.message,'error');}
}

// ── PWA ───────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

// ── MODAL CLOSE ON BACKDROP ───────────────────────────────────────────────────
['customerModal','jobModal','skipModal','quoteModal','invoiceModal','rescheduleModal','stripeLinkModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeModal(id);});
});

// ── BOOT ──────────────────────────────────────────────────────────────────────
initLogin();
</script>
