<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearRound – SE Home Services</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root {
  --navy-900:#0d1f35;
  --navy-800:#1e3a5f;
  --navy-700:#243f6a;
  --navy-600:#2d4f80;
  --navy-400:#4a7ab5;
  --gold:#f0a500;
  --gold-light:#fef3c7;
  --gold-dark:#c47f00;
  --white:#ffffff;
  --text:#e8edf5;
  --text-soft:#8fa8c8;
  --text-muted:#5a7a9e;
  --border:#243f6a;
  --border-soft:#1e3a5f;
  --done:#10b981;
  --done-light:rgba(16,185,129,.15);
  --warn:#f59e0b;
  --warn-light:rgba(245,158,11,.15);
  --danger:#ef4444;
  --danger-light:rgba(239,68,68,.15);
  --radius:10px;
  --radius-sm:7px;
  --sidebar:240px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--navy-900);color:var(--text);min-height:100vh;display:flex;}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--navy-800);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .25s;}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sidebar-logo-icon{width:36px;height:36px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--navy-900);flex-shrink:0;}
.sidebar-logo-text{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--white);line-height:1.3;}
.sidebar-logo-text span{color:var(--gold);}
.sidebar-logo-sub{font-size:10px;color:var(--text-muted);margin-top:1px;}
.sidebar-section{padding:16px 8px 4px;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-soft);font-size:13px;font-weight:500;transition:background .15s,color .15s;margin:1px 8px;text-decoration:none;}
.nav-item svg{width:17px;height:17px;flex-shrink:0;}
.nav-item:hover{background:var(--navy-700);color:var(--text);}
.nav-item.active{background:var(--gold);color:var(--navy-900);}
.nav-item.active svg{color:var(--navy-900);}
.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid var(--border);}
.sidebar-user{display:flex;align-items:center;gap:10px;}
.sidebar-user-avatar{width:32px;height:32px;border-radius:50%;background:var(--navy-600);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--gold);flex-shrink:0;}
.sidebar-user-name{font-size:13px;font-weight:500;color:var(--text);}
.sidebar-user-role{font-size:11px;color:var(--text-muted);}

/* MOBILE TOPBAR */
.mobile-topbar{display:none;background:var(--navy-800);border-bottom:1px solid var(--border);padding:0 16px;height:52px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
.mobile-logo{font-family:'DM Mono',monospace;font-size:14px;color:var(--white);}
.mobile-logo span{color:var(--gold);}
.hamburger{background:none;border:none;color:var(--text);cursor:pointer;padding:4px;}
.hamburger svg{width:22px;height:22px;}

/* MAIN */
.app-body{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.main{flex:1;padding:24px;max-width:960px;width:100%;}

/* PAGE HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.page-title{font-size:22px;font-weight:600;color:var(--white);}
.page-sub{font-size:13px;color:var(--text-muted);margin-top:3px;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:16px;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-muted);}
.search-input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;background:var(--navy-800);color:var(--text);outline:none;transition:border-color .15s;}
.search-input::placeholder{color:var(--text-muted);}
.search-input:focus{border-color:var(--gold);}

/* CARDS */
.card-list{display:flex;flex-direction:column;gap:6px;}
.card{background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,background .15s;}
.card:hover{border-color:var(--gold);background:var(--navy-700);}
.card-avatar{width:38px;height:38px;border-radius:9px;background:var(--navy-600);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--gold);flex-shrink:0;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:600;color:var(--white);}
.card-sub{font-size:12px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.badge-done{background:var(--done-light);color:var(--done);}
.badge-scheduled{background:rgba(74,122,181,.2);color:var(--navy-400);}
.badge-skipped{background:var(--warn-light);color:var(--warn);}
.badge-cant{background:var(--danger-light);color:var(--danger);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:none;outline:none;transition:background .15s,opacity .15s;}
.btn-primary{background:var(--gold);color:var(--navy-900);}
.btn-primary:hover{background:var(--gold-dark);}
.btn-ghost{background:transparent;color:var(--text-soft);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--navy-700);color:var(--text);}
.btn-danger{background:var(--danger);color:var(--white);}
.btn-done{background:var(--done);color:var(--white);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn svg{width:15px;height:15px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
@media(min-width:640px){.modal-overlay{align-items:center;justify-content:center;}}
.modal{background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-height:92vh;overflow-y:auto;transform:translateY(20px);transition:transform .2s;padding:24px 20px;}
.modal-overlay.open .modal{transform:translateY(0);}
@media(min-width:640px){.modal{border-radius:var(--radius);max-width:520px;max-height:85vh;}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:16px;font-weight:600;color:var(--white);}
.modal-close{width:30px;height:30px;border-radius:6px;background:var(--navy-700);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-soft);}
.modal-close:hover{background:var(--navy-600);}
.modal-close svg{width:15px;height:15px;}

/* FORM */
.form-grid{display:flex;flex-direction:column;gap:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;}
.field input,.field select,.field textarea{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;color:var(--text);background:var(--navy-900);outline:none;transition:border-color .15s;}
.field input::placeholder,.field textarea::placeholder{color:var(--text-muted);}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
.field select option{background:var(--navy-900);}
.field textarea{resize:vertical;min-height:72px;}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}

/* DETAIL SECTIONS */
.detail-section{background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.detail-section-header{padding:11px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between;}
.detail-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:var(--text-muted);}
.detail-value{font-weight:500;color:var(--text);}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--gold);cursor:pointer;background:none;border:none;padding:0;margin-bottom:16px;}
.back-btn svg{width:15px;height:15px;}

/* ROUND */
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.date-nav-btn{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--navy-800);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-soft);flex-shrink:0;}
.date-nav-btn:hover{border-color:var(--gold);color:var(--gold);}
.date-nav-btn svg{width:15px;height:15px;}
.date-display{flex:1;text-align:center;font-size:14px;font-weight:600;color:var(--white);}
.date-today-btn{font-size:12px;font-weight:500;color:var(--gold);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;white-space:nowrap;}
.date-today-btn:hover{background:var(--warn-light);}
.round-filter{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.round-filter select{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:13px;color:var(--text);background:var(--navy-800);outline:none;}
.round-filter select:focus{border-color:var(--gold);}
.round-filter select option{background:var(--navy-900);}
.round-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.round-stat{background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;}
.round-stat-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--white);}
.round-stat-label{font-size:10px;color:var(--text-muted);margin-top:2px;}
.round-list{display:flex;flex-direction:column;gap:6px;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty svg{width:44px;height:44px;margin-bottom:12px;opacity:.25;}
.empty-title{font-size:15px;font-weight:600;color:var(--text-soft);margin-bottom:6px;}
.empty-sub{font-size:13px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy-700);color:var(--white);border:1px solid var(--border);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;transition:transform .25s ease;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--done);border-color:var(--done);}
.toast.error{background:var(--danger);border-color:var(--danger);}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px 20px;color:var(--text-muted);font-size:14px;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* COMING SOON */
.coming-soon{text-align:center;padding:80px 20px;}
.coming-soon-icon{width:64px;height:64px;background:var(--navy-700);border:1px solid var(--border);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.coming-soon-icon svg{width:28px;height:28px;color:var(--gold);}
.coming-soon h2{font-size:18px;font-weight:600;color:var(--white);margin-bottom:8px;}
.coming-soon p{font-size:13px;color:var(--text-muted);}

/* SIDEBAR OVERLAY (mobile) */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay.open{display:block;}
  .mobile-topbar{display:flex;}
  .app-body{margin-left:0;}
  .main{padding:16px;}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">SE</div>
    <div>
      <div class="sidebar-logo-text">clear<span>round</span></div>
      <div class="sidebar-logo-sub">SE Home Services</div>
    </div>
  </div>
  <div class="sidebar-section">Work & Planning</div>
  <a class="nav-item active" data-page="round" onclick="navigate('round')">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
    Today's Round
  </a>
  <div class="sidebar-section">Manage Customers</div>
  <a class="nav-item" data-page="customers" onclick="navigate('customers')">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    Customers
  </a>
  <div class="sidebar-section">Billing & Quotes</div>
  <a class="nav-item" data-page="quotes" onclick="navigate('quotes')">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
    Quotes
  </a>
  <a class="nav-item" data-page="invoices" onclick="navigate('invoices')">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    Invoices
  </a>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-user-avatar">TR</div>
      <div><div class="sidebar-user-name">Tony Rogers</div><div class="sidebar-user-role">Owner</div></div>
    </div>
  </div>
</aside>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- MOBILE TOPBAR -->
<div class="mobile-topbar">
  <div class="mobile-logo">clear<span>round</span></div>
  <button class="hamburger" onclick="toggleSidebar()">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
</div>

<!-- MAIN -->
<div class="app-body">
  <main class="main" id="mainContent"></main>
</div>

<!-- CUSTOMER MODAL -->
<div class="modal-overlay" id="customerModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="customerModalTitle">Add customer</div>
      <button class="modal-close" onclick="closeModal('customerModal')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="form-grid">
      <div class="field"><label>Name *</label><input id="f-name" placeholder="Full name"></div>
      <div class="field"><label>Address *</label><input id="f-address" placeholder="Street address"></div>
      <div class="form-row">
        <div class="field"><label>Postcode *</label><input id="f-postcode" placeholder="SE9 1AA"></div>
        <div class="field"><label>Phone</label><input id="f-phone" placeholder="07700 900000"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>WhatsApp</label><input id="f-whatsapp" placeholder="+447700900000"></div>
        <div class="field"><label>Email</label><input id="f-email" placeholder="email@example.com"></div>
      </div>
      <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Access codes, dogs, gate codes…"></textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('customerModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCustomer()">Save customer</button>
    </div>
  </div>
</div>

<!-- JOB MODAL -->
<div class="modal-overlay" id="jobModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Schedule job</div>
      <button class="modal-close" onclick="closeModal('jobModal')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="form-grid">
      <div class="field"><label>Service type</label>
        <select id="j-service">
          <option value="">Select service…</option>
          <option>Window Cleaning: Front and Back Standard</option>
          <option>Window Cleaning: Front Only Standard</option>
          <option>Window Cleaning: Flat</option>
          <option>Window Cleaning: Commercial</option>
          <option>Window Cleaning: Commercial Outside Only</option>
          <option>Window Cleaning: Inside and Out</option>
          <option>Window Cleaning: Detached House</option>
          <option>Window Cleaning: One Off</option>
          <option>Gutter Cleaning: Terraced</option>
          <option>Gutter Cleaning: Semi Detached</option>
          <option>Gutter Cleaning: Detached</option>
          <option>Gutter Repairs</option>
          <option>Pool Clean Standard</option>
          <option>Conservatory Cleaning: Windows and Roof Standard</option>
          <option>Pressure Washing</option>
        </select>
      </div>
      <div class="form-row">
        <div class="field"><label>Price (£) *</label><input id="j-price" type="number" step="0.50" min="0" placeholder="0.00"></div>
        <div class="field"><label>Frequency</label>
          <select id="j-frequency">
            <option value="one-off">One-off</option>
            <option value="weekly">Weekly</option>
            <option value="fortnightly">Fortnightly</option>
            <option value="3-weekly">Every 3 weeks</option>
            <option value="4-weekly" selected>Every 4 weeks</option>
            <option value="6-weekly">Every 6 weeks</option>
            <option value="8-weekly">Every 8 weeks</option>
            <option value="12-weekly">Every 12 weeks</option>
            <option value="26-weekly">Every 26 weeks</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="field"><label>Next due date *</label><input id="j-date" type="date"></div>
        <div class="field"><label>Day of week</label>
          <select id="j-day">
            <option value="">Any day</option>
            <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
            <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="field"><label>Round</label>
          <select id="j-round">
            <option value="">No round</option>
            <option>Danny: All</option>
            <option>Danny: Weds</option>
            <option>Danny: Fri</option>
            <option>Blackheath/Chiselhurst/Eltham Sat</option>
            <option>Sidcup/Eltham Sat</option>
            <option>Tony Friday</option>
            <option>Gutter Clean</option>
            <option>Pool Cleaning</option>
            <option>Shop Signage Cleaning</option>
          </select>
        </div>
        <div class="field"><label>Assign to</label><select id="j-assigned"></select></div>
      </div>
      <div class="field"><label>Notes</label><textarea id="j-notes" placeholder="Job-specific notes…"></textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('jobModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveJob()">Save job</button>
    </div>
  </div>
</div>

<!-- SKIP MODAL -->
<div class="modal-overlay" id="skipModal">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <div class="modal-title" id="skipModalTitle">Skip job</div>
      <button class="modal-close" onclick="closeModal('skipModal')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="field"><label>Reason (optional)</label><textarea id="skip-notes" placeholder="Customer away, access issue…" style="min-height:80px"></textarea></div>

function todayStr(){const d=new Date();return d.toISOString().split('T')[0];}
function shiftDay(s,n){const d=new Date(s+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function fmtDate(s){if(!s)return'—';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});}
function fmtShort(s){if(!s)return'—';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

async function sb(path,opts={}){
  const url=`${SUPABASE_URL}/rest/v1/${path}`;
  const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};
  if(opts.prefer)headers['Prefer']=opts.prefer;
  const res=await fetch(url,{...opts,headers});
  if(!res.ok){let e;try{e=await res.json();}catch{e={message:res.statusText};}throw new Error(e.message||res.statusText);}
  if(res.status===204||opts.prefer==='return=minimal')return null;
  return res.json();
}

async function renderRound(){
  const el=document.getElementById('mainContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div> Loading round...</div>';
  let jobs=[];
  try{
    // Query by next_due — the primary scheduling field from Squeegee data
    let query=`wc_jobs?next_due=eq.${roundDate}&business_id=eq.${BUSINESS_ID}&order=round_order.asc,created_at.asc&select=*,wc_customers(name,address,postcode,notes)`;
    jobs=await sb(query);
    // Also pick up any jobs scheduled by date (manually added via the app)
    const byDate=await sb(`wc_jobs?scheduled_date=eq.${roundDate}&next_due=is.null&business_id=eq.${BUSINESS_ID}&select=*,wc_customers(name,address,postcode,notes)`);
    jobs=[...jobs,...byDate];
  }catch(e){el.innerHTML=`<div class="empty"><div class="empty-title">Could not load round</div><div class="empty-sub">${esc(e.message)}</div></div>`;return;}

  // Apply round filter
  const filtered=roundFilter?jobs.filter(j=>j.round_name===roundFilter):jobs;

  const done=filtered.filter(j=>j.status==='done').length;
  const skipped=filtered.filter(j=>j.status==='skipped'||j.status==='cant-access').length;
  const remaining=filtered.filter(j=>j.status==='scheduled').length;
  const earned=filtered.filter(j=>j.status==='done').reduce((s,j)=>s+parseFloat(j.price||0),0);
  const isToday=roundDate===todayStr();

  // Get unique rounds for filter dropdown
  const rounds=[...new Set(jobs.map(j=>j.round_name).filter(Boolean))].sort();

  el.innerHTML=`
    <div class="page-header">
      <div class="page-title">Today's Round</div>
      <div style="font-size:13px;color:var(--text-muted)">${filtered.length} job${filtered.length!==1?'s':''}</div>
    </div>

      <button class="date-nav-btn" onclick="changeRoundDate(-1)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button>
      <div class="date-display">${fmtDate(roundDate)}</div>
      ${!isToday?`<button class="date-today-btn" onclick="roundDate=todayStr();renderRound()">Today</button>`:'<div style="width:52px"></div>'}
      <button class="date-nav-btn" onclick="changeRoundDate(1)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></button>
    </div>
    ${rounds.length>1?`<div class="round-filter">
      <select onchange="roundFilter=this.value;renderRound()">
        <option value="">All rounds (${jobs.length})</option>
        ${rounds.map(r=>`<option value="${esc(r)}" ${roundFilter===r?'selected':''}>${esc(r)}</option>`).join('')}
      </select>
    </div>`:''}
    <div class="round-summary">
      <div class="round-stat"><div class="round-stat-val">${remaining}</div><div class="round-stat-label">To do</div></div>
      <div class="round-stat"><div class="round-stat-val" style="color:var(--done)">${done}</div><div class="round-stat-label">Done</div></div>
      <div class="round-stat"><div class="round-stat-val" style="color:var(--warn)">${skipped}</div><div class="round-stat-label">Skipped</div></div>
      <div class="round-stat"><div class="round-stat-val" style="font-size:13px">£${earned.toFixed(2)}</div><div class="round-stat-label">Earned</div></div>
    </div>
    <div class="round-list">${filtered.length
      ? filtered.map((j,i)=>roundCard(j,i+1)).join('')
      : `<div class="empty"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><div class="empty-title">No jobs on this date</div><div class="empty-sub">Jobs from Squeegee appear on their next due date.</div></div>`
    }</div>`;
}

function roundCard(j,num){
  const c=j.wc_customers||{};
  const isSched=j.status==='scheduled',isDone=j.status==='done',isSkip=j.status==='skipped',isCant=j.status==='cant-access';
  const bStyle=isDone?'border-color:var(--done);':isSkip?'border-color:var(--warn);':isCant?'border-color:var(--danger);':'';
  const numStyle=isDone?'background:var(--done-light);border-color:var(--done);color:var(--done);':'';
  const opacity=isDone||isSkip||isCant?'opacity:.75;':'';
  const svcLabel=j.service_type?`<div style="font-size:11px;color:var(--text-muted);margin-top:2px">${esc(j.service_type)}${j.round_name?' · <span style="color:var(--navy-400)">'+esc(j.round_name)+'</span>':''}</div>`:'';
  const actions=isSched
    ?`<div style="display:flex;gap:6px;padding:0 14px 12px">
        <button class="btn btn-done btn-sm" style="flex:1;justify-content:center" onclick="markDone('${j.id}')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>Done</button>
        <button class="btn btn-ghost btn-sm" style="flex:1;justify-content:center" onclick="openSkip('${j.id}','skipped')">Skip</button>
        <button class="btn btn-ghost btn-sm" style="flex:1;justify-content:center;color:var(--danger);border-color:rgba(239,68,68,.3)" onclick="openSkip('${j.id}','cant-access')">No access</button>
      </div>`
    :`<div style="padding:0 14px 12px"><button class="btn btn-ghost btn-sm" onclick="undoStatus('${j.id}')">Undo</button></div>`;
  return`<div style="background:var(--navy-800);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;${bStyle}${opacity}">
    <div style="display:flex;align-items:center;gap:12px;padding:12px 14px">
      <div style="width:26px;height:26px;border-radius:50%;background:var(--navy-700);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--text-muted);flex-shrink:0;${numStyle}">${isDone?'✓':num}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;color:var(--white)">${esc(c.name||'Unknown')}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.address||'')}${c.postcode?', '+esc(c.postcode):''}</div>
        ${svcLabel}
        ${c.notes?`<div style="font-size:11px;color:var(--warn);margin-top:3px;font-weight:500">&#9888; ${esc(c.notes)}</div>`:''}
        ${j.notes?`<div style="font-size:11px;color:var(--text-muted);margin-top:2px">&#128221; ${esc(j.notes)}</div>`:''}
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--gold);flex-shrink:0">£${parseFloat(j.price||0).toFixed(2)}</div>
    </div>${actions}</div>`;
}

function changeRoundDate(n){roundDate=shiftDay(roundDate,n);renderRound();}

async function markDone(id){
  try{
    await sb(`wc_jobs?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'done',last_done:roundDate}),prefer:'return=minimal'});
    showToast('Marked as done ✓','success');renderRound();
  }catch(e){showToast(e.message,'error');}
}
function openSkip(id,status){
  skipJobId=id;skipStatus=status;
  document.getElementById('skipModalTitle').textContent=status==='skipped'?'Skip job':"Can't access";
  document.getElementById('skip-notes').value='';
  document.getElementById('skipConfirmBtn').textContent=status==='skipped'?'Skip job':"Can't access";
  document.getElementById('skipModal').classList.add('open');
}
async function confirmSkip(){
  const notes=document.getElementById('skip-notes').value.trim()||null;
  try{
    await sb(`wc_jobs?id=eq.${skipJobId}`,{method:'PATCH',body:JSON.stringify({status:skipStatus,notes}),prefer:'return=minimal'});
    showToast(skipStatus==='skipped'?'Job skipped':'Marked no access','success');
    closeModal('skipModal');renderRound();
  }catch(e){showToast(e.message,'error');}
}
async function undoStatus(id){
  try{
    await sb(`wc_jobs?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'scheduled',last_done:null,notes:null}),prefer:'return=minimal'});
    showToast('Status reset','success');renderRound();
  }catch(e){showToast(e.message,'error');}
}

// ===== QUOTES =====
let quotes=[], quoteFilter='all', editingQuoteId=null;

async function renderQuotes(){
  const el=document.getElementById('mainContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div> Loading quotes...</div>';
  try{
    quotes=await sb(`wc_quotes?business_id=eq.${BUSINESS_ID}&order=created_at.desc&select=*,wc_customers(name,address,postcode)`);
  }catch(e){el.innerHTML=`<div class="empty"><div class="empty-title">Could not load quotes</div><div class="empty-sub">${esc(e.message)}</div></div>`;return;}

  const counts={all:quotes.length,draft:0,sent:0,accepted:0,declined:0};
  quotes.forEach(q=>{ if(counts[q.status]!==undefined) counts[q.status]++; });
  const filtered=quoteFilter==='all'?quotes:quotes.filter(q=>q.status===quoteFilter);

  el.innerHTML=`
    <div class="page-header">
      <div><div class="page-title">Quotes</div><div class="page-sub">${counts.all} total · ${counts.sent} sent · ${counts.accepted} accepted</div></div>
      <button class="btn btn-primary" onclick="openNewQuote()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>New quote</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
      ${['all','draft','sent','accepted','declined'].map(f=>`
        <button onclick="quoteFilter='${f}';renderQuotes()" style="padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:${quoteFilter===f?'var(--gold)':'var(--navy-800)'};color:${quoteFilter===f?'var(--navy-900)':'var(--text-soft)'}">
          ${f.charAt(0).toUpperCase()+f.slice(1)} (${counts[f]||0})
        </button>`).join('')}
    </div>
    <div class="card-list">${filtered.length ? filtered.map(q=>quoteCard(q)).join('') : '<div class="empty"><div class="empty-title">No quotes</div><div class="empty-sub">Create your first quote with the button above.</div></div>'}</div>`;
}

function quoteCard(q){
  const c=q.wc_customers||{};
  const statusColors={draft:'var(--text-muted)',sent:'var(--navy-400)',accepted:'var(--done)',declined:'var(--danger)'};
  const statusBg={draft:'rgba(90,122,158,.15)',sent:'rgba(74,122,181,.2)',accepted:'var(--done-light)',declined:'var(--danger-light)'};
  const col=statusColors[q.status]||'var(--text-muted)';
  const bg=statusBg[q.status]||'transparent';
  const svcLine=q.service_type?`<div style="font-size:11px;color:var(--text-muted);margin-top:2px">${esc(q.service_type)}${q.frequency&&q.frequency!=='one-off'?' · '+q.frequency:''}</div>`:'';
  return`<div class="card" onclick="showQuote('${q.id}')">
    <div class="card-avatar" style="background:${bg};color:${col}">${q.status==='accepted'?'✓':q.status==='declined'?'✗':'£'}</div>
    <div class="card-info">
      <div class="card-name">${esc(c.name||'Unknown customer')}</div>
      <div class="card-sub">${esc(c.address||'')}${c.postcode?', '+esc(c.postcode):''}</div>
      ${svcLine}
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div style="font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--gold)">£${parseFloat(q.price||0).toFixed(2)}</div>
      <div style="font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:${bg};color:${col};margin-top:4px">${q.status}</div>
    </div>
  </div>`;
}

async function showQuote(id){
  const el=document.getElementById('mainContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  let q=quotes.find(x=>x.id===id);
  if(!q){try{[q]=await sb(`wc_quotes?id=eq.${id}&select=*,wc_customers(name,address,postcode,phone,email)`);}catch(e){}}
  if(!q){el.innerHTML='<div class="empty"><div class="empty-title">Quote not found</div></div>';return;}
  const c=q.wc_customers||{};

  const actionBtns = q.status==='draft'
    ? `<button class="btn btn-primary" onclick="markQuoteSent('${q.id}')">Mark as sent</button>
       <button class="btn btn-ghost" onclick="openEditQuote('${q.id}')">Edit</button>`
    : q.status==='sent'
    ? `<button class="btn btn-done" onclick="acceptQuote('${q.id}')">✓ Accept → Create job</button>
       <button class="btn btn-ghost" style="color:var(--danger);border-color:rgba(239,68,68,.3)" onclick="declineQuote('${q.id}')">Decline</button>
       <button class="btn btn-ghost" onclick="openEditQuote('${q.id}')">Edit</button>`
    : q.status==='accepted'
    ? `<button class="btn btn-ghost" onclick="openEditQuote('${q.id}')">Edit</button>`
    : `<button class="btn btn-ghost" onclick="reopenQuote('${q.id}')">Reopen as draft</button>`;

  el.innerHTML=`
    <button class="back-btn" onclick="renderQuotes()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>Quotes</button>
    <div class="page-header">
      <div>
        <div class="page-title">${esc(c.name||'Unknown')}</div>
        <div class="page-sub">${esc(c.address||'')}${c.postcode?', '+esc(c.postcode):''}</div>
      </div>
      <span style="padding:4px 14px;border-radius:20px;font-size:13px;font-weight:600;background:${q.status==='accepted'?'var(--done-light)':q.status==='declined'?'var(--danger-light)':q.status==='sent'?'rgba(74,122,181,.2)':'rgba(90,122,158,.15)'};color:${q.status==='accepted'?'var(--done)':q.status==='declined'?'var(--danger)':q.status==='sent'?'var(--navy-400)':'var(--text-muted)'}">${q.status}</span>
    </div>
    <div class="detail-section">
      <div class="detail-section-header">Quote details</div>
      <div class="detail-row"><span class="detail-label">Price</span><span class="detail-value" style="font-family:'DM Mono',monospace;color:var(--gold);font-size:16px">£${parseFloat(q.price||0).toFixed(2)}</span></div>
      ${q.service_type?`<div class="detail-row"><span class="detail-label">Service</span><span class="detail-value">${esc(q.service_type)}</span></div>`:''}
      <div class="detail-row"><span class="detail-label">Frequency</span><span class="detail-value">${q.frequency||'one-off'}</span></div>
      ${q.round_name?`<div class="detail-row"><span class="detail-label">Round</span><span class="detail-value">${esc(q.round_name)}</span></div>`:''}
      ${q.day_of_week?`<div class="detail-row"><span class="detail-label">Day</span><span class="detail-value">${esc(q.day_of_week)}</span></div>`:''}
      ${q.notes?`<div class="detail-row"><span class="detail-label">Notes</span><span class="detail-value" style="white-space:pre-wrap">${esc(q.notes)}</span></div>`:''}
      <div class="detail-row"><span class="detail-label">Created</span><span class="detail-value">${fmtShort(q.created_at?.split('T')[0])}</span></div>
      ${q.sent_at?`<div class="detail-row"><span class="detail-label">Sent</span><span class="detail-value">${fmtShort(q.sent_at.split('T')[0])}</span></div>`:''}
      ${q.accepted_at?`<div class="detail-row"><span class="detail-label">Accepted</span><span class="detail-value" style="color:var(--done)">${fmtShort(q.accepted_at.split('T')[0])}</span></div>`:''}
      ${q.declined_at?`<div class="detail-row"><span class="detail-label">Declined</span><span class="detail-value" style="color:var(--danger)">${fmtShort(q.declined_at.split('T')[0])}</span></div>`:''}
    </div>
    ${c.phone||c.email?`<div class="detail-section"><div class="detail-section-header">Customer contact</div>
      ${c.phone?`<div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${esc(c.phone)}</span></div>`:''}
      ${c.email?`<div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${esc(c.email)}</span></div>`:''}
    </div>`:''}
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px">${actionBtns}</div>
    <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border)">
      <button class="btn btn-ghost btn-sm" style="color:var(--danger);border-color:rgba(239,68,68,.3)" onclick="deleteQuote('${q.id}')">Delete quote</button>
    </div>`;
}

async function openQuoteForCustomer(customerId){
  await openNewQuote();
  document.getElementById('q-customer').value=customerId;
}

async function openNewQuote(){
  editingQuoteId=null;
  document.getElementById('quoteModalTitle').textContent='New Quote';
  // Populate customer dropdown
  if(!customers.length) try{customers=await sb(`wc_customers?business_id=eq.${BUSINESS_ID}&active=eq.true&order=name.asc`);}catch(e){}
  const sel=document.getElementById('q-customer');
  sel.innerHTML='<option value="">Select customer…</option>'+customers.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  ['price','notes'].forEach(f=>document.getElementById('q-'+f).value='');
  document.getElementById('q-service').value='';
  document.getElementById('q-frequency').value='4-weekly';
  document.getElementById('q-round').value='';
  document.getElementById('q-day').value='';
  document.getElementById('quoteModal').classList.add('open');
}

async function openEditQuote(id){
  editingQuoteId=id;
  const q=quotes.find(x=>x.id===id);if(!q)return;
  document.getElementById('quoteModalTitle').textContent='Edit Quote';
  if(!customers.length) try{customers=await sb(`wc_customers?business_id=eq.${BUSINESS_ID}&active=eq.true&order=name.asc`);}catch(e){}
  const sel=document.getElementById('q-customer');
  sel.innerHTML='<option value="">Select customer…</option>'+customers.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  sel.value=q.customer_id||'';
  document.getElementById('q-price').value=q.price||'';
  document.getElementById('q-service').value=q.service_type||'';
  document.getElementById('q-frequency').value=q.frequency||'4-weekly';
  document.getElementById('q-round').value=q.round_name||'';
  document.getElementById('q-day').value=q.day_of_week||'';
  document.getElementById('q-notes').value=q.notes||'';
  document.getElementById('quoteModal').classList.add('open');
}

async function saveQuote(status){
  const customerId=document.getElementById('q-customer').value;
  const price=parseFloat(document.getElementById('q-price').value);
  if(!customerId){showToast('Select a customer','error');return;}
  if(!price||price<=0){showToast('Enter a valid price','error');return;}
  const payload={
    customer_id:customerId,
    business_id:BUSINESS_ID,
    price,
    status,
    frequency:document.getElementById('q-frequency').value||'one-off',
    service_type:document.getElementById('q-service').value||null,
    round_name:document.getElementById('q-round').value||null,
    day_of_week:document.getElementById('q-day').value||null,
    notes:document.getElementById('q-notes').value.trim()||null,
    sent_at:status==='sent'?new Date().toISOString():null,
  };
  try{
    if(editingQuoteId){
      await sb(`wc_quotes?id=eq.${editingQuoteId}`,{method:'PATCH',body:JSON.stringify(payload),prefer:'return=minimal'});
      showToast('Quote updated','success');
    }else{
      await sb('wc_quotes',{method:'POST',body:JSON.stringify(payload),prefer:'return=minimal'});
      showToast(status==='sent'?'Quote created & marked sent':'Quote saved as draft','success');
    }
    closeModal('quoteModal');renderQuotes();
  }catch(e){showToast(e.message,'error');}
}

async function markQuoteSent(id){
  try{
    await sb(`wc_quotes?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'sent',sent_at:new Date().toISOString()}),prefer:'return=minimal'});
    showToast('Quote marked as sent','success');renderQuotes();
  }catch(e){showToast(e.message,'error');}
}

async function acceptQuote(id){
  const q=quotes.find(x=>x.id===id);
  if(!q){showToast('Quote not found','error');return;}
  if(!confirm('Accept this quote and create a scheduled job?'))return;
  try{
    // 1. Mark quote accepted
    await sb(`wc_quotes?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'accepted',accepted_at:new Date().toISOString()}),prefer:'return=minimal'});
    // 2. Create the job
    const today=todayStr();
    await sb('wc_jobs',{method:'POST',body:JSON.stringify({
      business_id:BUSINESS_ID,
      customer_id:q.customer_id,
      price:q.price,
      frequency:q.frequency||'one-off',
      service_type:q.service_type||null,
      round_name:q.round_name||null,
      day_of_week:q.day_of_week||null,
      notes:q.notes||null,
      status:'scheduled',
      next_due:today,
      scheduled_date:today,
      round_order:0,
    }),prefer:'return=minimal'});
    showToast('Quote accepted — job created ✓','success');
    renderQuotes();
  }catch(e){showToast(e.message,'error');}
}

async function declineQuote(id){
  if(!confirm('Mark this quote as declined?'))return;
  try{
    await sb(`wc_quotes?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'declined',declined_at:new Date().toISOString()}),prefer:'return=minimal'});
    showToast('Quote declined','success');renderQuotes();
  }catch(e){showToast(e.message,'error');}
}

async function reopenQuote(id){
  try{
    await sb(`wc_quotes?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:'draft',declined_at:null}),prefer:'return=minimal'});
    showToast('Quote reopened as draft','success');renderQuotes();
  }catch(e){showToast(e.message,'error');}
}

async function deleteQuote(id){
  if(!confirm('Delete this quote permanently?'))return;
  try{
    await sb(`wc_quotes?id=eq.${id}`,{method:'DELETE',prefer:'return=minimal'});
    showToast('Quote deleted','success');renderQuotes();
  }catch(e){showToast(e.message,'error');}
}

['customerModal','jobModal','skipModal','quoteModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeModal(id);});
});

render();
